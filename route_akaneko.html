<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赤猫ルート解説</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f1a24; color: #e0e8d0; font-family: 'Hiragino Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; }

#stage { width: 100%; max-width: 680px; }

/* ライフ */
#life-area { display: flex; justify-content: space-between; margin-bottom: 10px; }
.life-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 13px; color: #ffdd88; font-weight: bold; }
.life-bar { width: 130px; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
.life-fill { height: 100%; border-radius: 6px; transition: width 0.6s; }
.life-fill.player { background: #4caf50; }
.life-fill.enemy { background: #c85a5a; }

/* フィールド */
#field { background: rgba(0,0,0,0.5); border: 2px solid #3a6a4a; border-radius: 14px; padding: 12px; }
.zone-label { font-size: 11px; color: #6a8a6a; margin-bottom: 4px; }
.zone { display: flex; gap: 8px; flex-wrap: wrap; min-height: 95px; padding: 8px; border-radius: 8px; margin-bottom: 8px; align-items: flex-start; }
.enemy-zone { background: rgba(200,80,80,0.1); border: 1px solid rgba(200,80,80,0.3); }
.player-zone { background: rgba(80,180,80,0.1); border: 1px solid rgba(80,180,80,0.3); }
.hand-zone { min-height: 75px; background: rgba(80,80,180,0.1); border: 1px solid rgba(80,80,180,0.3); }

/* 領土エリア */
.territory-zone { display: flex; gap: 6px; padding: 6px 8px; margin-bottom: 8px; flex-wrap: wrap; align-items: center; }

/* 領土カード */
.territory-card {
width: 38px; height: 26px; border-radius: 4px;
background: #2a4a2a; border: 1px solid #4a8a4a;
display: flex; align-items: center; justify-content: center;
font-size: 10px; color: #a8e0a8; font-weight: bold;
transition: transform 0.4s, background 0.3s, border-color 0.3s, opacity 0.3s;
}
.territory-card.used {
transform: rotate(90deg);
background: #1a2a1a;
border-color: #2a4a2a;
opacity: 0.5;
}

/* カード */
.card {
width: 62px; height: 88px; border-radius: 6px; overflow: visible;
border: 2px solid #4a8a4a; background: #1a2a3a;
position: relative; flex-shrink: 0;
transition: transform 0.3s, opacity 0.3s, box-shadow 0.3s;
}
.card img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; display: block; }
.card.muted { opacity: 0.45; transform: rotate(90deg); }
.card.highlighted { box-shadow: 0 0 14px 4px #ffdd00; border-color: #ffdd00; }
.card.targeted { box-shadow: 0 0 14px 4px #ff4444; border-color: #ff4444; }
.card.entering { animation: slideIn 0.35s ease; }

/* ATK+1/DEF+1カウンターバッジ */
.counter-badge {
position: absolute;
top: -8px; right: -8px;
background: #ff8800;
color: white;
font-size: 8px;
font-weight: bold;
padding: 2px 4px;
border-radius: 8px;
white-space: nowrap;
border: 1px solid #ffaa44;
z-index: 10;
}

/* 攻撃バフバッジ */
.atk-buff-badge {
position: absolute;
bottom: -8px; left: -4px;
background: #cc0044;
color: white;
font-size: 7px;
font-weight: bold;
padding: 2px 3px;
border-radius: 4px;
white-space: nowrap;
z-index: 10;
}

/* 手札カード（小さめ） */
.hand-card {
width: 50px; height: 70px; border-radius: 5px; overflow: hidden;
border: 2px solid #4a6a9a; background: #1a2a3a; flex-shrink: 0;
}
.hand-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.hand-card.used-card { opacity: 0.3; filter: grayscale(1); }

/* ダメージ演出 */
.damage-float {
position: fixed;
font-size: 30px; font-weight: bold;
color: #ff4444; text-shadow: 0 0 12px #ff0000;
pointer-events: none;
animation: floatUp 1s ease forwards;
z-index: 200;
}

@keyframes floatUp {
0% { opacity: 1; transform: translateY(0) scale(1.3); }
100% { opacity: 0; transform: translateY(-70px) scale(0.8); }
}
@keyframes slideIn {
from { opacity: 0; transform: translateY(-20px); }
to { opacity: 1; transform: translateY(0); }
}

/* 説明 */
#description {
background: rgba(0,0,0,0.65); border: 1px solid #4a8a4a;
border-radius: 10px; padding: 12px 14px; margin-top: 10px;
font-size: 13px; line-height: 1.75; min-height: 64px;
}
#step-title { color: #ffdd88; font-weight: bold; font-size: 15px; margin-bottom: 4px; }
#step-text { color: #d0e8d0; white-space: pre-line; }

/* ループバッジ */
#loop-badge {
display: none; background: #7a1a1a; color: #ffaaaa;
font-size: 13px; font-weight: bold; padding: 6px 14px;
border-radius: 20px; margin-top: 8px; text-align: center;
border: 1px solid #c85a5a;
}

/* コントロール */
#controls { display: flex; gap: 10px; margin-top: 10px; justify-content: center; align-items: center; }
.ctrl-btn { padding: 8px 18px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; }
.ctrl-btn.prev { background: #3a3a5a; color: #aaccff; }
.ctrl-btn.next { background: #3a6a3a; color: #a8e0a8; }
.ctrl-btn.reset { background: #4a1a1a; color: #ffaaaa; font-size: 12px; padding: 6px 12px; }
#step-counter { color: #888; font-size: 13px; min-width: 50px; text-align: center; }
</style>

</head>

}

const steps = [
  {
    title: "初期状態",
    text: "盤面に火付け狸がいます。\n手札：赤猫×1・呪われた勲章×3\n領土：山岳×2以上あればOK（ここでは2枚で説明）",

    action: s => {
      s.hand = s.hand.filter(h => h !== "赤猫");
      s.playerField.push("赤猫");
      s.usedTerritories = 1;
      return s;
    },
    highlight: ["赤猫"],

    title: "② 呪われた勲章1枚目（対象：赤猫）",

      s.usedHand.push("勲章3");

      s.usedHand = [];
      s.nekoCounters = 0;
      s.nekoBattleBuff = false;
      s.tanukilMuted = false;
      s.shakunetsuMuted = false;

      s.toriInGrave = 2;
      return s;
    },

  },

    action: s => {

      s.hand = [];
      s.nekoCounters = 3;

    },

      s.nekoCounters = 4;

      s.nekoCounters = 5;
      s.nekoBattleBuff = true;

    action: s => {
      s.playerField = s.playerField.filter(c => c !== "赤猫");
      s.enemyLife -= 5;
      s.tanukilMuted = false;
      s.shakunetsuMuted = false;

    action: s => {
      s.playerField.push("炎の鳥1");

    action: s => s,
    isExtra: true,

let state = {};
let currentStep = 0;

function makeCardEl(name, opts = {}) {
  const wrap = document.createElement("div");
  wrap.className = "card entering";
  if (opts.muted) wrap.classList.add("muted");
  if (opts.highlighted) wrap.classList.add("highlighted");

  const img = document.createElement("img");
  const key = name === "赤猫" ? "赤猫"
    : name === "火付け狸" ? "火付け狸"
    : name === "灼熱の風" ? "灼熱の風"
    : name.startsWith("炎の鳥") ? "炎の鳥1"
    : "呪われた勲章";
  img.src = IMAGES[key] || "";
  img.onerror = () => {
    wrap.style.background = "#2a3a4a";
    wrap.style.display = "flex";
    wrap.style.alignItems = "center";
    wrap.style.justifyContent = "center";
    const label = document.createElement("div");
    label.style.cssText = "font-size:8px;color:#aaa;padding:2px;text-align:center;";
    label.textContent = name.replace("勲章","勲章");
    wrap.appendChild(label);
  };
  wrap.appendChild(img);

  if (opts.counters > 0) {
    const badge = document.createElement("div");
    badge.className = "counter-badge";
    badge.textContent = `ATK+${opts.counters}/DEF+${opts.counters}`;
    wrap.appendChild(badge);
  }
  if (opts.battleBuff) {
    const badge2 = document.createElement("div");
    badge2.className = "atk-buff-badge";
    badge2.textContent = "攻撃時+1点";
    wrap.appendChild(badge2);
  }
  return wrap;
}

function makeHandCardEl(name, used) {
  const wrap = document.createElement("div");
  wrap.className = "hand-card" + (used ? " used-card" : "");
  const img = document.createElement("img");
  const key = name === "赤猫" ? "赤猫"
    : name === "火付け狸" ? "火付け狸"
    : name === "灼熱の風" ? "灼熱の風"
    : name.startsWith("炎の鳥") ? "炎の鳥1"
    : "呪われた勲章";
  img.src = IMAGES[key] || "";
  img.onerror = () => {
    wrap.style.background = "#2a3a4a";
    wrap.style.display = "flex";
    wrap.style.alignItems = "center";
    wrap.style.justifyContent = "center";
    const label = document.createElement("div");
    label.style.cssText = "font-size:8px;color:#aaa;text-align:center;padding:2px;";
    label.textContent = name.includes("勲章") ? "勲章" : name;
    wrap.appendChild(label);
  };
  wrap.appendChild(img);
  return wrap;
}

function showDamage(target, amount, delay = 0) {
  setTimeout(() => {
    const el = document.createElement("div");
    el.className = "damage-float";
    el.textContent = `-${amount}`;
    const refId = target === "enemy" ? "enemy-field" : "player-field";
    const rect = document.getElementById(refId).getBoundingClientRect();
    el.style.left = (rect.left + rect.width / 2 - 20) + "px";
    el.style.top = (window.scrollY + rect.top + 10) + "px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }, delay);
}

// 赤猫→相手の2段階ダメージ演出
function showNekoChainDamage(amount) {
  // 1. 赤猫にダメージ
  showDamage("player", amount, 200);
  // 2. 赤猫の効果で相手にも
  showDamage("enemy", amount, 700);
}

function render() {
  const s = state;
  const step = steps[currentStep];

  // ライフ
  const eLife = Math.max(0, s.enemyLife);
  document.getElementById("enemy-life-num").textContent = eLife;
  document.getElementById("enemy-life-bar").style.width = (eLife / 20 * 100) + "%";

  // 自分フィールド
  const pf = document.getElementById("player-field");
  pf.innerHTML = "";
  const highlights = step.highlight || [];
  s.playerField.forEach(name => {
    const el = makeCardEl(name, {
      muted: (name === "火付け狸" && s.tanukilMuted) || (name === "灼熱の風" && s.shakunetsuMuted),
      highlighted: highlights.includes(name),
      counters: name === "赤猫" ? s.nekoCounters : 0,
      battleBuff: name === "赤猫" && (s.nekoBattleBuff || s.nekoBattleBuff2),
    });
    pf.appendChild(el);
  });

  // 領土
  const ta = document.getElementById("territory-area");
  ta.innerHTML = "";
  for (let i = 0; i < s.totalTerritories; i++) {
    const card = document.createElement("div");
    card.className = "territory-card" + (i < s.usedTerritories ? " used" : "");
    card.textContent = "山";
    ta.appendChild(card);
  }

  // 手札（使用済みはグレーアウト）
  const ha = document.getElementById("hand-area");
  ha.innerHTML = "";
  // 全手札を表示（使用済みはグレー）
  const allHandCards = ["赤猫", "勲章1", "勲章2", "勲章3"];
  allHandCards.forEach(name => {
    const inHand = s.hand.includes(name) || s.usedHand.includes(name);
    if (!inHand) return;
    const used = s.usedHand.includes(name) || !s.hand.includes(name);
    ha.appendChild(makeHandCardEl(name, used));
  });

  // 説明
  document.getElementById("step-title").textContent = step.title;
  document.getElementById("step-text").textContent = step.text;
  document.getElementById("step-counter").textContent = `${currentStep + 1} / ${steps.length}`;

  // ループバッジ
  const badge = document.getElementById("loop-badge");
  if (step.isLoop) {
    badge.style.display = "block";
    badge.style.background = "#7a1a1a";
    badge.style.color = "#ffaaaa";
    badge.style.borderColor = "#c85a5a";
    badge.textContent = "🔁 ここからループ！1周で8点ダメージ";
  } else if (step.isExtra) {
    badge.style.display = "block";
    badge.style.background = "#1a3a5a";
    badge.style.color = "#88ccff";
    badge.style.borderColor = "#4a8aaa";
    badge.textContent = "✨ 発展編";
  } else {
    badge.style.display = "none";
  }
}

function nextStep() {
  if (currentStep < steps.length - 1) {
    currentStep++;
    const step = steps[currentStep];
    state = step.action({ ...state });
    if (step.damage) {
      if (step.damage.chain) {
        showNekoChainDamage(step.damage.amount);
      } else {
        setTimeout(() => showDamage(step.damage.target, step.damage.amount), 300);
      }
    }
    render();
  }
}

function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    replayTo(currentStep);
  }
}

function replayTo(target) {
  let s = initState();
  for (let i = 0; i <= target; i++) {
    s = steps[i].action({ ...s });
  }
  state = s;
  render();
}

function resetAll() {
  currentStep = 0;
  state = initState();
  render();
}

state = initState();
render();
</script>

</body>
</html>
