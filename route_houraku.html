<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>崩落ルート解説</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f1a24; color: #e0e8d0; font-family: 'Hiragino Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 12px; }
#stage { width: 100%; max-width: 680px; }

#life-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.life-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 13px; color: #ffdd88; font-weight: bold; }
.life-bar { width: 120px; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
.life-fill { height: 100%; border-radius: 6px; transition: width 0.6s; }
.life-fill.player { background: #4caf50; }
.life-fill.enemy { background: #c85a5a; }
#title-center { text-align: center; color: #a8e0a8; font-size: 14px; flex: 1; }

#field { background: rgba(0,0,0,0.5); border: 2px solid #3a6a4a; border-radius: 12px; padding: 7px; position: relative; }

#turn-badge {
  position: absolute; top: 6px; right: 8px;
  background: rgba(20,60,100,0.9); color: #88ccff;
  font-size: 11px; font-weight: bold;
  padding: 2px 7px; border-radius: 10px;
  border: 1px solid #4488ff; z-index: 20;
}

#kodo-counter {
  position: absolute; top: 30px; right: 8px;
  background: rgba(100,50,0,0.9); color: #ffaa44;
  font-size: 11px; font-weight: bold;
  padding: 2px 7px; border-radius: 10px;
  border: 1px solid #ff8800; z-index: 20;
}

.zone-label { font-size: 10px; color: #6a8a6a; margin-bottom: 2px; }
.zone { display: flex; gap: 5px; flex-wrap: wrap; padding: 5px; border-radius: 8px; margin-bottom: 4px; align-items: flex-start; }
.player-zone { background: rgba(80,180,80,0.1); border: 1px solid rgba(80,180,80,0.3); }
.pile-zone {
  background: rgba(60,60,20,0.25); border: 1px dashed rgba(200,180,50,0.5);
  border-radius: 6px; padding: 5px; margin-bottom: 4px;
  min-height: 12px; display: flex; gap: 5px; flex-wrap: wrap; align-items: flex-start;
}
.territory-zone { display: flex; gap: 4px; padding: 4px 6px; margin-bottom: 4px; flex-wrap: wrap; align-items: center; }
.hand-zone { background: rgba(80,80,180,0.1); border: 1px solid rgba(80,80,180,0.3); }

.card {
  width: 40px; height: 56px; border-radius: 4px; overflow: hidden;
  border: 2px solid #4a8a4a; background: #1a2a3a;
  position: relative; flex-shrink: 0;
  transition: transform 0.3s, opacity 0.3s, box-shadow 0.3s;
}
.card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card.muted { opacity: 0.45; transform: rotate(90deg); }
.card.highlighted { box-shadow: 0 0 12px 3px #ffdd00; border-color: #ffdd00; }
.card.entering { animation: slideIn 0.35s ease; }
.card.boss { border-color: #ff6600; box-shadow: 0 0 14px 4px rgba(255,100,0,0.6); }

.kodo-badge {
  position: absolute; top: 2px; left: 0; right: 0;
  background: rgba(180,80,0,0.92); color: #ffddaa; font-size: 7px; font-weight: bold;
  padding: 1px 2px; text-align: center; z-index: 10;
}
.atk-badge {
  position: absolute; bottom: 2px; left: 0; right: 0;
  background: rgba(200,0,0,0.92); color: #ffaaaa; font-size: 7px; font-weight: bold;
  padding: 1px 2px; text-align: center; z-index: 10;
}

.hand-card {
  width: 40px; height: 56px; border-radius: 4px; overflow: hidden;
  border: 2px solid #4a6a9a; background: #1a2a3a; flex-shrink: 0;
}
.hand-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

.territory-card {
  width: 34px; height: 22px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: bold;
  transition: transform 0.4s, opacity 0.3s;
}
.territory-card.used { transform: rotate(90deg); opacity: 0.4; }
.territory-card.plain    { background: #3a3a1a; border: 1px solid #8a8a4a; color: #ffffaa; }
.territory-card.forest   { background: #1a3a1a; border: 1px solid #4a8a4a; color: #aaffaa; }
.territory-card.water    { background: #1a2a4a; border: 1px solid #4a6a8a; color: #aaccff; }
.territory-card.mountain { background: #4a2a2a; border: 1px solid #8a4a4a; color: #ffaaaa; }

.damage-float {
  position: fixed; font-size: 22px; font-weight: bold;
  pointer-events: none; animation: floatUp 1s ease forwards; z-index: 200;
  white-space: nowrap;
}
.damage-float.player-dmg { color: #44ff44; text-shadow: 0 0 12px #00ff00; }

@keyframes floatUp {
  from { opacity: 1; transform: translateY(0) scale(1.3); }
  to   { opacity: 0; transform: translateY(-60px) scale(0.8); }
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-14px); }
  to   { opacity: 1; transform: translateY(0); }
}

#description {
  background: rgba(0,0,0,0.65); border: 1px solid #4a8a4a;
  border-radius: 10px; padding: 12px 14px; margin-top: 8px;
  font-size: 13px; line-height: 1.75; min-height: 64px;
}
#step-title { color: #ffdd88; font-weight: bold; font-size: 15px; margin-bottom: 4px; }
#step-text { color: #d0e8d0; }

#loop-badge {
  display: none; font-size: 13px; font-weight: bold; padding: 5px 14px;
  border-radius: 20px; margin-top: 8px; text-align: center;
}

#controls { display: flex; gap: 8px; margin-top: 8px; justify-content: center; align-items: center; }
.ctrl-btn { padding: 9px 0; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; flex: 1; max-width: 120px; }
.ctrl-btn.prev { background: #3a3a5a; color: #aaccff; }
.ctrl-btn.close-btn { background: #3a3a3a; color: #cccccc; }
.ctrl-btn.next { background: #3a6a3a; color: #a8e0a8; }
#sub-controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 6px; }
.ctrl-btn.play-btn { background: #1a4a5a; color: #88ddff; font-size: 12px; padding: 4px 12px; flex: none; }
.ctrl-btn.play-btn.playing { background: #4a2a1a; color: #ffaa66; }
.ctrl-btn.reset { background: #4a1a1a; color: #ffaaaa; font-size: 11px; padding: 4px 12px; flex: none; }
#step-counter { color: #888; font-size: 13px; }
</style>
</head>
<body>
<div id="stage">

  <div id="life-area">
    <div class="life-bar-wrap">
      <span>相手 ❤️ <span id="enemy-life-num">20</span></span>
      <div class="life-bar"><div class="life-fill enemy" id="enemy-life-bar" style="width:100%"></div></div>
    </div>
    <div id="title-center">🏔 崩落ルート解説</div>
    <div class="life-bar-wrap">
      <span>自分 ❤️ <span id="player-life-num">20</span></span>
      <div class="life-bar"><div class="life-fill player" id="player-life-bar" style="width:100%"></div></div>
    </div>
  </div>

  <div id="field">
    <div id="turn-badge">📅 <span id="turn-label">準備</span></div>
    <div id="kodo-counter">🏔 高度カウンター：<span id="kodo-count">0</span>/6</div>

    <div class="zone-label">自分の戦場</div>
    <div class="zone player-zone" id="player-field"></div>

    <div class="zone-label">パイル</div>
    <div class="pile-zone" id="pile-area"></div>

    <div class="zone-label">領土</div>
    <div class="territory-zone" id="territory-area"></div>

    <div class="zone-label">手札</div>
    <div class="zone hand-zone" id="hand-area"></div>
  </div>

  <div id="controls">
    <button class="ctrl-btn prev" onclick="prevStep()">◀ 前へ</button>
    <button class="ctrl-btn close-btn" onclick="history.back()">✕ 閉じる</button>
    <button class="ctrl-btn next" onclick="nextStep()">次へ ▶</button>
  </div>
  <div id="sub-controls">
    <span id="step-counter"></span>
    <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶ 再生</button>
    <button class="ctrl-btn reset" onclick="resetAll()">↺ リセット</button>
  </div>

  <div id="loop-badge"></div>

  <div id="description">
    <div id="step-title"></div>
    <div id="step-text"></div>
  </div>
</div>

<script>
const IMAGES = {
  崩落:         "https://acgtcg.com/img/BP4-003",
  爆破場:       "https://acgtcg.com/img/BP4-004",
  波場の参謀:   "https://acgtcg.com/img/BP4-005",
  貧相な道具屋: "https://acgtcg.com/img/BP4-002",
  妖狐の巻物:   "https://acgtcg.com/img/ACG-020",
};

function initState() {
  return {
    playerLife: 20,
    enemyLife: 20,
    playerField: [],
    hand: ["貧相な道具屋", "波場の参謀", "崩落", "爆破場"],
    territories: [],
    usedTerr: 0,
    kodo: 0,
    turn: "準備",
  };
}

const steps = [
  {
    title: "初期状態",
    text: "手札：貧相な道具屋・波場の参謀・崩落・爆破場<br>領土を毎ターン1枚ずつ置いて崩落のコストを下げながら、4ターン目にコンボ始動を目指します。",
    action: s => s,
  },
  {
    title: "【1ターン目】平地の領土を置く",
    text: "1ターン目は平地の領土を置きます。<br>貧相な道具屋は平地と森林が必要なので少しずつ準備します。",
    action: s => {
      s.territories = ["平"]; s.usedTerr = 0; s.turn = "1ターン目";
      return s;
    },
    turn: "1ターン目",
  },
  {
    title: "【2ターン目】森林の領土を置く→貧相な道具屋をプレイ",
    text: "2ターン目に森林を追加。平地＋森林が揃ったので貧相な道具屋（コスト2）をプレイ。<br>登場効果でデッキから妖狐の巻物をサーチして戦場に出します。",
    action: s => {
      s.territories = ["平", "森"]; s.usedTerr = 2; s.turn = "2ターン目";
      s.hand = s.hand.filter(h => h !== "貧相な道具屋");
      s.playerField = ["貧相な道具屋", "妖狐の巻物"];
      return s;
    },
    highlight: ["貧相な道具屋", "妖狐の巻物"],
    turn: "2ターン目",
  },
  {
    title: "【3ターン目】水生の領土を置く→波場の参謀をプレイ",
    text: "3ターン目に水生を追加。波場の参謀（コスト2・平水）をプレイ。<br>登場効果でデッキからコスト6以上のカード（崩落）を手札に加えます。",
    action: s => {
      s.territories = ["平", "森", "水"]; s.usedTerr = 2; s.turn = "3ターン目";
      s.hand = s.hand.filter(h => h !== "波場の参謀");
      s.playerField.push("波場の参謀");
      return s;
    },
    highlight: ["波場の参謀", "崩落"],
    turn: "3ターン目",
  },
  {
    title: "【4ターン目】山岳の領土を置く→崩落をプレイ！",
    text: "4ターン目に山岳を追加。領土が自分4枚＋相手の領土分だけコスト軽減。<br>妖狐の巻物をムーブして山岳条件を補完。<br>崩落（コスト6）を大幅軽減してプレイ！戦場に出ます。",
    action: s => {
      s.territories = ["平", "森", "水", "山"]; s.usedTerr = 1; s.turn = "4ターン目";
      s.hand = s.hand.filter(h => h !== "崩落");
      s.playerField = s.playerField.map(c => c === "妖狐の巻物" ? "妖狐の巻物_muted" : c);
      s.playerField.push("崩落");
      return s;
    },
    highlight: ["崩落"],
    turn: "4ターン目",
  },
  {
    title: "【4ターン目】爆破場1回目：高度カウンター+1・自分-1点",
    text: "崩落が戦場にいる状態で爆破場（コスト0・山山）をプレイ。<br>→ 爆破場が戦場に出た時：自分に1点ダメージ（自分ライフ19）<br>→ 崩落の誘発：縄張りが出た！高度カウンター+1（1/6）<br>→ 波場の参謀の誘発：1点ダメージ受けた→爆破場（コスト0）を手札に戻す！",
    action: s => {
      s.playerLife -= 1; s.kodo = 1;
      return s;
    },
    damage_player: 1,
    highlight: ["崩落", "波場の参謀", "爆破場"],
    isLoop: true,
  },
  {
    title: "【4ターン目】爆破場を繰り返す→高度カウンター6個！",
    text: "同じ手順を繰り返します：<br>爆破場プレイ→自分-1点→崩落に高度+1→参謀がバウンスして手札へ<br><br>6回繰り返すと：<br>・自分ライフ：20-6＝<b>14点</b><br>・崩落の高度カウンター：<b>6個！</b><br>→ 崩落が《不壊》《突破》ATK12の動物に変化！",
    action: s => {
      s.playerLife -= 5; s.kodo = 6;
      return s;
    },
    damage_player: 5,
    highlight: ["崩落"],
    isLoop: true,
  },
  {
    title: "【4ターン目】崩落でアタック→相手は即敗北！",
    text: "崩落がATK12・《突破》・《不壊》の動物になったのでアタック！<br>→ 崩落が相手に戦闘ダメージを与えた瞬間…<br><b>相手は残りライフに関係なく即敗北！</b>🏆<br><br>爆破場のバーン（相手への2点）は今回は発生しませんが、それでも一発で決まります！",
    action: s => {
      s.enemyLife = 0;
      s.playerField = s.playerField.map(c => c === "崩落" ? "崩落_boss_muted" : c);
      return s;
    },
    highlight: ["崩落"],
  },
  {
    title: "✅ まとめ：崩落ルートのポイント",
    text: "【必要カード】<br>・貧相な道具屋：妖狐の巻物をサーチ（山岳条件補完）<br>・波場の参謀：崩落をサーチ＋爆破場のバウンス役<br>・妖狐の巻物：爆破場の山山条件を補完<br>・爆破場：コスト0で繰り返し出して高度カウンターを稼ぐ<br>・崩落：高度6で即勝利の動物に変身<br><br>【重要】崩落を必ず先に出してから爆破場を出すこと！<br>【ターン】1平→2森→3水→4山でコンボ始動<br>【副産物】妖狐の巻物に妨害時の補修カウンターが溜まり九尾へのプランBにも<br>【リスク】自分に6点ダメージが入るので注意",
    action: s => s,
  },
];

let state = {}, currentStep = 0;

function makeCard(name, opts = {}) {
  const isMuted = name.includes("_muted");
  const isBoss = name.includes("_boss");
  const baseName = name.replace("_muted","").replace("_boss","");
  const div = document.createElement("div");
  div.className = "card" + (isMuted ? " muted" : "") + (isBoss ? " boss" : "") + (opts.highlighted ? " highlighted" : "");

  const imgKey = Object.keys(IMAGES).find(k => baseName.includes(k));
  if (imgKey) {
    const img = document.createElement("img");
    img.src = IMAGES[imgKey];
    img.onerror = () => {
      div.style.cssText += ";display:flex;align-items:center;justify-content:center;font-size:6px;color:#aaa;text-align:center;padding:2px;";
      div.textContent = baseName;
    };
    div.appendChild(img);
  } else {
    div.style.cssText += ";display:flex;align-items:center;justify-content:center;font-size:6px;color:#aaa;text-align:center;padding:2px;background:#2a3a4a;";
    div.textContent = baseName;
  }

  if (baseName === "崩落" && opts.kodo > 0) {
    const b = document.createElement("div");
    b.className = "kodo-badge";
    b.textContent = `高度×${opts.kodo}`;
    div.appendChild(b);
  }
  if (isBoss) {
    const b = document.createElement("div");
    b.className = "atk-badge";
    b.textContent = "ATK12 突破";
    div.appendChild(b);
  }
  return div;
}

function showDamage(amount, isPlayer) {
  setTimeout(() => {
    const el = document.createElement("div");
    el.className = "damage-float " + (isPlayer ? "player-dmg" : "enemy-dmg");
    el.textContent = `-${amount}点`;
    const barId = isPlayer ? "player-life-bar" : "enemy-life-bar";
    const rect = document.getElementById(barId).getBoundingClientRect();
    el.style.left = (rect.left + rect.width / 2 - 25) + "px";
    el.style.top = (window.scrollY + rect.top - 10) + "px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }, 300);
}

function render() {
  const s = state;
  const step = steps[currentStep];
  const hl = step.highlight || [];

  document.getElementById("enemy-life-num").textContent = Math.max(0, s.enemyLife);
  document.getElementById("enemy-life-bar").style.width = (Math.max(0, s.enemyLife) / 20 * 100) + "%";
  document.getElementById("player-life-num").textContent = Math.max(0, s.playerLife);
  document.getElementById("player-life-bar").style.width = (Math.max(0, s.playerLife) / 20 * 100) + "%";
  document.getElementById("kodo-count").textContent = s.kodo;
  document.getElementById("turn-label").textContent = s.turn || "";

  // 戦場
  const pf = document.getElementById("player-field");
  pf.innerHTML = "";
  s.playerField.forEach(name => {
    const baseName = name.replace("_muted","").replace("_boss","");
    const isHl = hl.some(h => baseName.includes(h) || h.includes(baseName));
    pf.appendChild(makeCard(name, { highlighted: isHl, kodo: s.kodo }));
  });

  // パイル
  const pa = document.getElementById("pile-area"); pa.innerHTML = "";

  // 領土
  const ta = document.getElementById("territory-area"); ta.innerHTML = "";
  s.territories.forEach((t, i) => {
    const card = document.createElement("div");
    const tc = t==="平"?" plain":t==="森"?" forest":t==="水"?" water":" mountain";
    card.className = "territory-card" + tc + (i < s.usedTerr ? " used" : "");
    card.textContent = t; ta.appendChild(card);
  });

  // 手札
  const ha = document.getElementById("hand-area"); ha.innerHTML = "";
  s.hand.forEach(name => {
    const div = document.createElement("div"); div.className = "hand-card";
    const imgKey = Object.keys(IMAGES).find(k => name.includes(k));
    if (imgKey) {
      const img = document.createElement("img");
      img.src = IMAGES[imgKey];
      img.onerror = () => { div.style.cssText+=";display:flex;align-items:center;justify-content:center;font-size:6px;color:#aaa;text-align:center;padding:2px;"; div.textContent=name; };
      div.appendChild(img);
    } else {
      div.style.cssText+=";display:flex;align-items:center;justify-content:center;font-size:6px;color:#aaa;text-align:center;padding:2px;"; div.textContent=name;
    }
    ha.appendChild(div);
  });

  document.getElementById("step-title").textContent = step.title;
  document.getElementById("step-text").innerHTML = step.text;
  document.getElementById("step-counter").textContent = `${currentStep + 1} / ${steps.length}`;

  const badge = document.getElementById("loop-badge");
  if (step.isLoop) {
    badge.style.cssText = "display:block;background:#4a2a0a;color:#ffddaa;font-size:13px;font-weight:bold;padding:5px 14px;border-radius:20px;margin-top:8px;text-align:center;border:1px solid #ff8800;";
    badge.textContent = "🔁 爆破場ループ！高度カウンターが増える！";
  } else {
    badge.style.display = "none";
  }
}

function deepCopy(s) {
  return { ...s, playerField: [...s.playerField], hand: [...s.hand], territories: [...s.territories] };
}

function applyStep(idx) {
  const step = steps[idx];
  state = step.action(deepCopy(state));
  if (step.damage_player) showDamage(step.damage_player, true);
  render();
}

function nextStep() { stopPlay(); if (currentStep < steps.length-1) { currentStep++; applyStep(currentStep); } }
function prevStep() { stopPlay(); if (currentStep > 0) { currentStep--; let s=initState(); for(let i=0;i<=currentStep;i++) s=steps[i].action({...s,playerField:[...s.playerField],hand:[...s.hand],territories:[...s.territories]}); state=s; render(); } }
function resetAll() { stopPlay(); currentStep=0; state=initState(); render(); }

let playTimer = null;
const PLAY_INTERVAL = 2500;
function togglePlay() { if (playTimer) { stopPlay(); } else { startPlay(); } }
function startPlay() { const btn=document.getElementById("playBtn"); btn.textContent="⏸ 停止"; btn.classList.add("playing"); playTimer=setInterval(()=>{ if(currentStep<steps.length-1){currentStep++;applyStep(currentStep);}else{stopPlay();} },PLAY_INTERVAL); }
function stopPlay() { if(playTimer){clearInterval(playTimer);playTimer=null;} const btn=document.getElementById("playBtn"); if(btn){btn.textContent="▶ 再生";btn.classList.remove("playing");} }

state = initState();
render();
</script>
</body>
</html>
