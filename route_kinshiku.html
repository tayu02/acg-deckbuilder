<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>禁止区狼ルート解説</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f1a24; color: #e0e8d0; font-family: 'Hiragino Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 12px; }
#stage { width: 100%; max-width: 680px; }

#life-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.life-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 13px; color: #ffdd88; font-weight: bold; }
.life-bar { width: 120px; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
.life-fill { height: 100%; border-radius: 6px; transition: width 0.6s; }
.life-fill.player { background: #4caf50; }
.life-fill.enemy { background: #c85a5a; }
#title-center { text-align: center; color: #a8e0a8; font-size: 14px; flex: 1; }

#field { background: rgba(0,0,0,0.5); border: 2px solid #3a6a4a; border-radius: 12px; padding: 7px; position: relative; }

#loop-counter {
  position: absolute; top: 6px; right: 8px;
  background: rgba(20,100,20,0.85); color: #88ff88;
  font-size: 11px; font-weight: bold;
  padding: 2px 7px; border-radius: 10px;
  border: 1px solid #44ff44; z-index: 20;
}

.zone-label { font-size: 10px; color: #6a8a6a; margin-bottom: 2px; }
.zone { display: flex; gap: 5px; flex-wrap: wrap; padding: 5px; border-radius: 8px; margin-bottom: 4px; align-items: flex-start; }
.player-zone { background: rgba(80,180,80,0.1); border: 1px solid rgba(80,180,80,0.3); min-height: 68px; }
.pile-zone {
  background: rgba(60,60,20,0.25); border: 1px dashed rgba(200,180,50,0.5);
  border-radius: 6px; padding: 5px; margin-bottom: 4px;
  min-height: 12px;
}
.exile-zone {
  background: rgba(80,20,80,0.2); border: 1px solid rgba(150,50,150,0.4);
  border-radius: 6px; padding: 5px; margin-bottom: 4px;
  min-height: 12px; display: flex; gap: 5px; flex-wrap: wrap;
}
.territory-zone { display: flex; gap: 4px; padding: 4px 6px; margin-bottom: 4px; flex-wrap: wrap; }
.hand-zone { background: rgba(80,80,180,0.1); border: 1px solid rgba(80,80,180,0.3); min-height: 68px; }

.card {
  width: 40px; height: 56px; border-radius: 4px; overflow: hidden;
  border: 2px solid #4a8a4a; background: #1a2a3a;
  position: relative; flex-shrink: 0;
  transition: transform 0.3s, opacity 0.3s, box-shadow 0.3s;
}
.card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card.muted { opacity: 0.45; transform: rotate(90deg); }
.card.highlighted { box-shadow: 0 0 12px 3px #ffdd00; border-color: #ffdd00; }
.card.entering { animation: slideIn 0.35s ease; }
.card.exiled { opacity: 0.5; filter: grayscale(0.5); border-color: #6a2a6a; }

.hand-card {
  width: 40px; height: 56px; border-radius: 4px; overflow: hidden;
  border: 2px solid #4a6a9a; background: #1a2a3a; flex-shrink: 0;
}
.hand-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

.territory-card {
  width: 34px; height: 22px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: bold;
  transition: transform 0.4s, opacity 0.3s;
}
.territory-card.forest { background: #1a3a1a; border: 1px solid #4a8a4a; color: #aaffaa; }
.territory-card.mountain { background: #4a2a2a; border: 1px solid #8a4a4a; color: #ffaaaa; }
.territory-card.plain { background: #2a2a3a; border: 1px solid #6a6a9a; color: #aaaaff; }
.territory-card.used { transform: rotate(90deg); opacity: 0.4; }

.deck-bar-wrap { margin-bottom: 6px; }
.deck-bar { height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
.deck-bar-fill { height: 100%; background: #c85a5a; border-radius: 5px; transition: width 0.6s; }

.damage-float {
  position: fixed; font-size: 22px; font-weight: bold;
  pointer-events: none; animation: floatUp 1s ease forwards; z-index: 200;
}
.damage-float.enemy-dmg { color: #ff4444; text-shadow: 0 0 12px #ff0000; }
.damage-float.heal { color: #44ff88; text-shadow: 0 0 12px #00ff66; }
.damage-float.deck-dmg { color: #ff8844; text-shadow: 0 0 10px #ff4400; }

@keyframes floatUp {
  0% { opacity:1; transform:translateY(0) scale(1.3); }
  100% { opacity:0; transform:translateY(-60px) scale(0.8); }
}
@keyframes slideIn {
  from { opacity:0; transform:translateY(-14px); }
  to { opacity:1; transform:translateY(0); }
}

/* ナビボタン */
#nav-buttons { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:8px; }
.nav-btn { padding:5px 10px; border:1px solid #4a8a4a; border-radius:8px; background:#1a2a1a; color:#a8e0a8; font-size:12px; cursor:pointer; }
.nav-btn.active { background:#3a6a3a; border-color:#88cc88; color:#ffffff; font-weight:bold; }

#description {
  background: rgba(0,0,0,0.65); border: 1px solid #4a8a4a;
  border-radius: 10px; padding: 12px 14px; margin-top: 8px;
  font-size: 13px; line-height: 1.75; min-height: 64px;
}
#step-title { color: #ffdd88; font-weight: bold; font-size: 15px; margin-bottom: 4px; }
#step-text { color: #d0e8d0; }

#loop-badge { display:none; font-size:13px; font-weight:bold; padding:5px 14px; border-radius:20px; margin-top:8px; text-align:center; }

#controls { display: flex; gap: 8px; margin-top: 8px; justify-content: center; }
.ctrl-btn { padding: 9px 0; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; flex: 1; max-width: 120px; }
.ctrl-btn.prev { background: #3a3a5a; color: #aaccff; }
.ctrl-btn.close-btn { background: #3a3a3a; color: #cccccc; }
.ctrl-btn.next { background: #3a6a3a; color: #a8e0a8; }
#sub-controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 6px; }
.ctrl-btn.play-btn { background: #1a4a5a; color: #88ddff; font-size: 12px; padding: 4px 12px; flex: none; }
.ctrl-btn.play-btn.playing { background: #4a2a1a; color: #ffaa66; }
.ctrl-btn.reset { background: #4a1a1a; color: #ffaaaa; font-size: 11px; padding: 4px 12px; flex: none; }
#step-counter { color: #888; font-size: 13px; }
</style>
</head>
<body>
<div id="stage">
  <div id="life-area">
    <div class="life-bar-wrap">
      <span>相手 ❤️ <span id="enemy-life-num">20</span></span>
      <div class="life-bar"><div class="life-fill enemy" id="enemy-life-bar" style="width:100%"></div></div>
    </div>
    <div id="title-center">🐺 禁止区狼ルート解説</div>
    <div class="life-bar-wrap">
      <span>自分 ❤️ <span id="player-life-num">20</span></span>
      <div class="life-bar"><div class="life-fill player" id="player-life-bar" style="width:100%"></div></div>
    </div>
  </div>

  <div id="nav-buttons">
    <button class="nav-btn" onclick="jumpTo(0)">基本ループ</button>
    <button class="nav-btn" onclick="jumpTo(7)">✨鉄鴉コンボ</button>
    <button class="nav-btn" onclick="jumpTo(15)">🐄乳牛ループ</button>
    <button class="nav-btn" onclick="jumpTo(21)">🦔子モグラLO</button>
  </div>

  <div id="field">
    <div id="loop-counter">🔁 <span id="loop-label">ループ：0回</span></div>

    <div class="zone-label">自分の戦場</div>
    <div class="zone player-zone" id="player-field"></div>

    <div class="zone-label">パイル（効果スタック）</div>
    <div class="pile-zone" id="pile-area"></div>

    <div class="zone-label">除外</div>
    <div class="exile-zone" id="exile-area"></div>

    <div class="zone-label" id="terr-label">領土</div>
    <div class="territory-zone" id="territory-area"></div>

    <div id="deck-bar-wrap" style="display:none; margin-bottom:4px;">
      <div class="zone-label">相手デッキ 🃏 <span id="deck-num">40</span>枚</div>
      <div class="deck-bar"><div class="deck-bar-fill" id="deck-bar-fill" style="width:100%"></div></div>
    </div>

    <div class="zone-label">手札</div>
    <div class="zone hand-zone" id="hand-area"></div>
  </div>

  <div id="controls">
    <button class="ctrl-btn prev" onclick="prevStep()">◀ 前へ</button>
    <button class="ctrl-btn close-btn" onclick="history.back()">✕ 閉じる</button>
    <button class="ctrl-btn next" onclick="nextStep()">次へ ▶</button>
  </div>
  <div id="sub-controls">
    <span id="step-counter"></span>
    <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶ 再生</button>
    <button class="ctrl-btn reset" onclick="resetAll()">↺ リセット</button>
  </div>
  <div id="loop-badge"></div>
  <div id="description">
    <div id="step-title"></div>
    <div id="step-text"></div>
  </div>
</div>

<script>
const IMAGES = {
  不法侵入禁止区: "https://acgtcg.com/img/BP1-040",
  足跡の発火:     "https://acgtcg.com/img/ACG-085",
  救助する森狼:   "https://acgtcg.com/img/BP1-041",
  鉄洗いグマ:     "https://acgtcg.com/img/ACG-159",
  鉄クズ:         "https://acgtcg.com/img/ACG-160",
  鉄鴉:           "https://acgtcg.com/img/ACG-161",
  乳牛:           "https://acgtcg.com/img/BP2-009",
  子モグラ:       "https://acgtcg.com/img/BP1-033",
};

// セクション開始インデックス
const SECTION_STARTS = { basic: 0, tekki: 8, milkcow: 17, mogura: 24 };

function initState() {
  return {
    enemyLife: 20, playerLife: 20,
    enemyDeck: 40,
    field: ["不法侵入禁止区", "足跡の発火"],
    hand: ["救助する森狼"],
    exile: [], pile: [],
    territories: ["森","森","森","山"],
    usedTerr: 0,
    loopCount: 0, totalDmg: 0,
    tekkiAtk: 0,
    showDeck: false,
    loopLabel: "ループ：0回",
  };
}

// =============== ステップ定義 ===============
const steps = [
  // ===== 基本ループ (0〜7) =====
  {
    title: "【基本】初期状態",
    text: "盤面：不法侵入禁止区・足跡の発火<br>手札：救助する森狼<br>領土：森×3・山×1<br><br>救助する森狼を手札起動してループを開始します！",
    action: s => ({...initState()}),
    section: "basic",
  },
  {
    title: "① 救助する森狼の手札起動",
    text: "救助する森狼の手札起動：森林域3以上なら手札のこれを除外して発動。<br>除外したこれをムーブ状態で戦場に出す。<br>この時『戦場に出た時にこれを生贄に捧げる』を得る。<br>→ 救助する森狼が除外へ！",
    action: s => { s.hand=[]; s.exile=["救助する森狼"]; return s; },
    highlight: ["救助する森狼"], section: "basic",
  },
  {
    title: "② 救助する森狼が戦場へ（生贄付き）",
    text: "除外から救助する森狼がムーブ状態で戦場に登場！<br>プレイではなく効果による登場です。",
    action: s => { s.exile=[]; s.field.push("救助する森狼"); return s; },
    highlight: ["救助する森狼"], entering: true, section: "basic",
  },
  {
    title: "③ 足跡の発火が反応→相手に1点！",
    text: "動物が戦場に出たので足跡の発火の誘発が発動！<br>→ 相手に1点ダメージ！",
    action: s => { s.enemyLife-=1; s.totalDmg+=1; return s; },
    damage: 1, highlight: ["足跡の発火"], section: "basic",
  },
  {
    title: "④ 不法侵入禁止区の誘発→森狼を手札へ！",
    text: "不法侵入禁止区の誘発：プレイ以外で出た動物を手札に戻す！<br>→ 救助する森狼が手札に戻る。ループ！",
    action: s => {
      s.field = s.field.filter(c => c !== "救助する森狼");
      s.hand = ["救助する森狼"]; s.loopCount += 1;
      s.loopLabel = `ループ：${s.loopCount}回 / ${s.totalDmg}点`;
      return s;
    },
    highlight: ["不法侵入禁止区"], isLoop: true, section: "basic",
  },
  {
    title: "🔁 ループ継続中…",
    text: "①〜④を繰り返します。1ループで1点ダメージ。<br>20回繰り返せば相手ライフを0に！",
    action: s => {
      s.loopCount=10; s.totalDmg=10; s.enemyLife=10;
      s.loopLabel = `ループ：10回 / 10点`;
      return s;
    },
    isLoop: true, section: "basic",
  },
  {
    title: "20ループで相手ライフ0！",
    text: "20回ループして相手ライフが0に！<br><br>【必要カード】<br>・不法侵入禁止区：プレイ以外で出た動物を手札へ<br>・足跡の発火：動物が出るたびに1点<br>・救助する森狼：手札起動で除外→戦場<br>・森林域3以上の領土",
    action: s => { s.loopCount=20; s.totalDmg=20; s.enemyLife=0; s.loopLabel="20回ループ！"; return s; },
    section: "basic",
  },

  // ===== 鉄鴉コンボ (7〜16) =====
  {
    title: "【✨鉄鴉コンボ】初期状態",
    text: "盤面：不法侵入禁止区・鉄洗いグマ・鉄クズ×4<br>手札：救助する森狼<br>領土：森×3・平×1・山×2<br><br>鉄鴉を絡めて1ループ4点ダメージに！",
    action: s => ({
      ...initState(),
      field: ["不法侵入禁止区","鉄洗いグマ","鉄クズ","鉄クズ","鉄クズ","鉄クズ"],
      hand: ["救助する森狼"],
      territories: ["森","森","森","平","山","山"],
      tekkiAtk: 0,
    }),
    section: "tekki",
  },
  {
    title: "【鉄鴉①】鉄洗いグマ起動→鉄クズ×4を墓地へ",
    text: "鉄洗いグマをムーブして起動！<br>戦場の鉄クズをすべて生贄にして道具カードX枚を墓地へ。<br>→ 鉄クズ4枚が墓地へ。鉄鴉プレイ時のATKが4に！",
    action: s => {
      s.field = s.field.filter(c => c !== "鉄クズ");
      s.field = s.field.map(c => c==="鉄洗いグマ" ? "鉄洗いグマ_muted" : c);
      s.tekkiAtk = 4; return s;
    },
    highlight: ["鉄洗いグマ"], section: "tekki",
  },
  {
    title: "【鉄鴉②】鉄クズの墓地起動→鉄鴉を手札へ",
    text: "墓地の鉄クズを除外して道具カードを手札に加える。<br>→ 鉄鴉（コスト0）が手札へ！",
    action: s => { s.exile=["鉄クズ","鉄クズ","鉄クズ","鉄クズ"]; s.hand.push("鉄鴉"); return s; },
    highlight: ["鉄鴉"], section: "tekki",
  },
  {
    title: "【鉄鴉③】鉄鴉をプレイ（平山）→早業でムーブ→4点！",
    text: "鉄鴉をプレイ（条件：平×1・山×2）。《早業》でそのままムーブ！<br>起動効果：ATK点（=このターン墓地に置いた道具の数）だけ相手に直接ダメージ！<br>→ 4点ダメージ！",
    action: s => {
      s.hand = s.hand.filter(h => h !== "鉄鴉");
      s.field.push("鉄鴉_muted");
      s.usedTerr = 3; // 平1・山2
      s.enemyLife -= 4; s.totalDmg += 4; return s;
    },
    damage: 4, highlight: ["鉄鴉"], section: "tekki",
  },
  {
    title: "【鉄鴉④】救助する森狼の手札起動→除外→戦場へ",
    text: "救助する森狼を手札から起動→除外→ムーブ状態で戦場へ。<br>『生贄付き』で登場。",
    action: s => {
      s.hand = []; s.exile = [...s.exile, "救助する森狼"];
      s.field.push("救助する森狼"); return s;
    },
    highlight: ["救助する森狼"], entering: true, section: "tekki",
  },
  {
    title: "【鉄鴉⑤】不法侵入禁止区→森狼と鉄鴉が手札へ！",
    text: "不法侵入禁止区の誘発：このターンにプレイ以外で戦場に出た動物（森狼）を手札へ。<br>鉄鴉もプレイで出ているので手札に戻る！<br>→ 救助する森狼・鉄鴉が両方手札へ。ループ！",
    action: s => {
      s.field = s.field.filter(c => c!=="救助する森狼" && c!=="鉄鴉_muted");
      s.exile = s.exile.filter(c => c!=="救助する森狼");
      s.hand = ["救助する森狼","鉄鴉"];
      s.usedTerr = 0; s.loopCount += 1;
      s.loopLabel = `ループ：${s.loopCount}回 / ${s.totalDmg}点`;
      return s;
    },
    highlight: ["不法侵入禁止区","救助する森狼","鉄鴉"], isLoop: true, section: "tekki",
  },
  {
    title: "【鉄鴉⑥】鉄鴉を再プレイ→4点！以下ループ",
    text: "鉄鴉を再びプレイ（コスト：平1・山2）→早業でムーブ→4点！<br>その後また森狼を起動→戦場→禁止区で手札へ→鉄鴉も手札へ。<br>1ループ4点、5ループで20点フィニッシュ！",
    action: s => {
      s.hand = s.hand.filter(h => h !== "鉄鴉");
      s.field.push("鉄鴉_muted");
      s.usedTerr = 3;
      s.enemyLife -= 4; s.totalDmg += 4;
      s.loopLabel = `ループ：${s.loopCount}回 / ${s.totalDmg}点`;
      return s;
    },
    damage: 4, highlight: ["鉄鴉"], isLoop: true, section: "tekki",
  },
  {
    title: "✅ まとめ：鉄鴉コンボ",
    text: "【基本ループとの比較】<br>・基本：1ループ1点（足跡の発火）→20回必要<br>・鉄鴉コンボ：1ループ4点（鉄鴉ATK）→5回で決着！<br><br>【鍵となる動き】<br>鉄洗いグマで鉄クズを墓地に送りATKを上げてから鉄鴉を打つ。<br>禁止区が鉄鴉も手札に戻してくれるのがポイント！",
    action: s => s, section: "tekki",
  },

  // ===== 乳牛ループ (16〜22) =====
  {
    title: "【🐄乳牛ループ】初期状態",
    text: "盤面：不法侵入禁止区<br>手札：救助する森狼・乳牛<br>領土：白×1・緑×3<br><br>乳牛を繰り返しプレイして無限にライフを回復！<br>これは勝つためではなく戦いを長引かせるためのコンボです。",
    action: s => ({
      ...initState(),
      field: ["不法侵入禁止区"],
      hand: ["救助する森狼","乳牛"],
      territories: ["白","緑","緑","緑"],
      loopLabel: "回復：0回",
    }),
    section: "milkcow",
  },
  {
    title: "【乳牛①】乳牛をプレイ→《早業》で即起動→1点回復！",
    text: "乳牛をプレイ（コスト0・条件：平）。<br>《早業》を持つので即ムーブして起動できます。<br>起動効果：ムーブ→ライフ1点回復！",
    action: s => {
      s.hand = s.hand.filter(h => h !== "乳牛");
      s.field.push("乳牛_muted");
      s.playerLife = Math.min(20, s.playerLife + 1);
      return s;
    },
    heal: 1, highlight: ["乳牛"], section: "milkcow",
  },
  {
    title: "【乳牛②】救助する森狼の手札起動→除外→戦場へ",
    text: "救助する森狼を手札から起動（森林域3以上）→除外→ムーブ状態で戦場へ。<br>『生贄付き』で登場。",
    action: s => {
      s.hand = [];
      s.exile = ["救助する森狼"];
      s.field.push("救助する森狼");
      return s;
    },
    highlight: ["救助する森狼"], entering: true, section: "milkcow",
  },
  {

      s.hand = [];
      s.exile = ["救助する森狼"];
      s.field.push("救助する森狼");
      return s;

  },

      s.field = s.field.filter(c => c !== "子モグラ");
      s.hand = ["子モグラ"];
      return s;
    },
    highlight: ["救助する森狼","子モグラ"], section: "mogura",
  },
  {
    title: "【子モグラ④】不法侵入禁止区の誘発→森狼を手札へ！",
    text: "不法侵入禁止区の誘発：プレイ以外で出た動物を手札に戻す。<br>→ 救助する森狼が手札へ！",
    action: s => {
      s.field = s.field.filter(c => c !== "救助する森狼");
      s.exile = [];
      s.hand = ["子モグラ","救助する森狼"];
      s.loopCount += 1;
      s.loopLabel = `LO：${s.loopCount}枚削り`;
      return s;

  {

    isLoop: true, section: "mogura",

  {

    action: s => {
      s.loopCount = 40; s.enemyDeck = 0;
      s.loopLabel = "LO達成！40枚削り";
      return s;

let state={}, currentStep=0;

function getImg(name) {
  const base = name.replace("_muted","").replace(/\d+$/,"");
  return IMAGES[base] || null;
}

function makeCard(name, opts={}) {
  const isMuted = name.includes("_muted") || opts.muted;
  const base = name.replace("_muted","").replace(/\d+$/,"");
  const div = document.createElement("div");
  div.className = "card" + (isMuted?" muted":"") + (opts.highlighted?" highlighted":"") + (opts.entering?" entering":"") + (opts.exiled?" exiled":"");
  const url = getImg(name);
  if (url) {
    const img = document.createElement("img");
    img.src = url;
    img.onerror = () => { div.style.cssText+=";display:flex;align-items:center;justify-content:center;font-size:6px;color:#aaa;text-align:center;padding:2px;"; div.textContent=base; };
    div.appendChild(img);
  } else {
    div.style.cssText+=";display:flex;align-items:center;justify-content:center;font-size:6px;color:#aaa;text-align:center;padding:2px;background:#2a3a4a;";
    div.textContent=base;
  }
  if (base==="鉄鴉" && state.tekkiAtk > 0) {
    const b=document.createElement("div");
    b.style.cssText="position:absolute;top:2px;left:0;right:0;background:rgba(180,0,50,0.9);color:white;font-size:7px;font-weight:bold;padding:1px;text-align:center;z-index:10;";
    b.textContent=`ATK${state.tekkiAtk}`;
    div.style.position="relative"; div.appendChild(b);
  }
  return div;
}

function showFloat(type, amount) {
  setTimeout(() => {
    const el = document.createElement("div");
    el.className = "damage-float " + type;
    if (type==="enemy-dmg") el.textContent=`-${amount}点`;
    else if (type==="heal") el.textContent=`+${amount}点`;
    else el.textContent=`-${amount}枚`;
    const bar = document.getElementById(type==="deck-dmg"?"deck-bar-fill":"enemy-life-bar");
    const rect = bar.getBoundingClientRect();
    el.style.left=(rect.left+rect.width/2-25)+"px";
    el.style.top=(window.scrollY+rect.top-10)+"px";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1200);
  },400);
}

function render() {
  const s=state, step=steps[currentStep], hl=step.highlight||[];

  document.getElementById("player-life-num").textContent=s.playerLife;
  document.getElementById("player-life-bar").style.width=(s.playerLife/20*100)+"%";
  document.getElementById("enemy-life-num").textContent=Math.max(0,s.enemyLife);
  document.getElementById("enemy-life-bar").style.width=(Math.max(0,s.enemyLife)/20*100)+"%";
  document.getElementById("loop-label").textContent=s.loopLabel||"";

  // デッキバー
  const deckWrap=document.getElementById("deck-bar-wrap");
  deckWrap.style.display = s.showDeck?"block":"none";
  if (s.showDeck) {
    document.getElementById("deck-num").textContent=Math.max(0,s.enemyDeck);
    document.getElementById("deck-bar-fill").style.width=(Math.max(0,s.enemyDeck)/40*100)+"%";
  }

  // 戦場
  const pf=document.getElementById("player-field"); pf.innerHTML="";
  s.field.forEach(name=>{
    const base=name.replace("_muted","").replace(/\d+$/,"");
    const isHl=hl.some(h=>base.includes(h)||h.includes(base));
    const isEntering=name==="救助する森狼"&&step.entering;
    pf.appendChild(makeCard(name,{highlighted:isHl,entering:isEntering}));
  });

  // パイル
  const pa=document.getElementById("pile-area"); pa.innerHTML="";
  (s.pile||[]).forEach(e=>{
    const el=document.createElement("div");
    el.style.cssText="background:rgba(80,70,0,0.7);border:1px solid #aa9900;border-radius:6px;padding:3px 6px;font-size:10px;color:#ffee88;margin:2px 0;";
    el.textContent="▶ "+e; pa.appendChild(el);
  });

  // 除外
  const ea=document.getElementById("exile-area"); ea.innerHTML="";
  s.exile.forEach(name=>{
    ea.appendChild(makeCard(name,{exiled:true}));
  });

  // 領土
  const ta=document.getElementById("territory-area"); ta.innerHTML="";
  const terrLabel = s.territories.join("・");
  document.getElementById("terr-label").textContent=`領土（${terrLabel}）`;
  const terrMap={"森":"forest","山":"mountain","平":"plain","白":"plain","緑":"forest"};
  s.territories.forEach((t,i)=>{
    const card=document.createElement("div");
    card.className="territory-card "+(terrMap[t]||"forest")+(i<s.usedTerr?" used":"");
    card.textContent=t; ta.appendChild(card);
  });

  // 手札
  const ha=document.getElementById("hand-area"); ha.innerHTML="";
  s.hand.forEach(name=>{
    const div=document.createElement("div"); div.className="hand-card";
    const url=getImg(name);
    if(url){const img=document.createElement("img");img.src=url;img.onerror=()=>{div.style.cssText+=";display:flex;align-items:center;justify-content:center;font-size:6px;color:#aaa;text-align:center;padding:2px;";div.textContent=name;};div.appendChild(img);}
    ha.appendChild(div);
  });

  document.getElementById("step-title").textContent=step.title;
  document.getElementById("step-text").innerHTML=step.text;
  document.getElementById("step-counter").textContent=`${currentStep+1} / ${steps.length}`;

  // バッジ
  const badge=document.getElementById("loop-badge");
  if(step.isLoop){
    badge.style.cssText="display:block;background:#1a4a1a;color:#88ff88;font-size:13px;font-weight:bold;padding:5px 14px;border-radius:20px;margin-top:8px;text-align:center;border:1px solid #44aa44;";
    badge.textContent="🔁 ループ！";
  } else { badge.style.display="none"; }

  // ナビボタンのactive状態
  const sections=["basic","tekki","milkcow","mogura"];
  const navBtns=document.querySelectorAll(".nav-btn");
  navBtns.forEach((btn,i)=>{
    btn.classList.toggle("active", step.section===sections[i]);
  });
}

function deepCopy(s) {
  return {...s, field:[...s.field], hand:[...s.hand], exile:[...s.exile], pile:[...(s.pile||[])], territories:[...s.territories]};
}

function applyStep(idx) {
  state=steps[idx].action(deepCopy(state));
  if(steps[idx].damage) showFloat("enemy-dmg",steps[idx].damage);
  if(steps[idx].heal) showFloat("heal",steps[idx].heal);
  if(steps[idx].deckDmg) showFloat("deck-dmg",steps[idx].deckDmg);
  render();
}

function nextStep(){stopPlay();if(currentStep<steps.length-1){currentStep++;applyStep(currentStep);}}
function prevStep(){
  stopPlay();
  if(currentStep>0){
    currentStep--;
    let s=initState();
    for(let i=0;i<=currentStep;i++) s=steps[i].action(deepCopy(s));
    state=s; render();
  }
}
function resetAll(){stopPlay();currentStep=0;state=initState();render();}
function jumpTo(idx){stopPlay();currentStep=idx;let s=initState();for(let i=0;i<=idx;i++)s=steps[i].action(deepCopy(s));state=s;render();}

let playTimer=null;
const PLAY_INTERVAL=2500;
function togglePlay(){if(playTimer){stopPlay();}else{startPlay();}}
function startPlay(){
  const btn=document.getElementById("playBtn");
  btn.textContent="⏸ 停止";btn.classList.add("playing");
  playTimer=setInterval(()=>{if(currentStep<steps.length-1){currentStep++;applyStep(currentStep);}else{stopPlay();}},PLAY_INTERVAL);
}
function stopPlay(){
  if(playTimer){clearInterval(playTimer);playTimer=null;}
  const btn=document.getElementById("playBtn");
  if(btn){btn.textContent="▶ 再生";btn.classList.remove("playing");}
}

state=initState();
render();
</script>
