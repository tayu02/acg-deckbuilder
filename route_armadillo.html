<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アルマジロルート解説</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f1a24; color: #e0e8d0; font-family: 'Hiragino Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 12px; }
#stage { width: 100%; max-width: 680px; }

#life-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.life-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 13px; color: #ffdd88; font-weight: bold; }
.life-bar { width: 120px; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
.life-fill { height: 100%; border-radius: 6px; transition: width 0.6s; }
.life-fill.player { background: #4caf50; }
.life-fill.enemy { background: #c85a5a; }
#title-center { text-align: center; color: #a8e0a8; font-size: 14px; flex: 1; }

#field { background: rgba(0,0,0,0.5); border: 2px solid #3a6a4a; border-radius: 12px; padding: 7px; position: relative; }

#dmg-counter {
  position: absolute; top: 6px; right: 8px;
  background: rgba(150,80,0,0.85); color: #ffddaa;
  font-size: 11px; font-weight: bold;
  padding: 2px 7px; border-radius: 10px;
  border: 1px solid #ffaa44; z-index: 20;
}

.zone-label { font-size: 10px; color: #6a8a6a; margin-bottom: 2px; }
.zone { display: flex; gap: 5px; flex-wrap: wrap; padding: 5px; border-radius: 8px; margin-bottom: 4px; align-items: flex-start; }
.player-zone { background: rgba(80,180,80,0.1); border: 1px solid rgba(80,180,80,0.3); }
.pile-zone {
  background: rgba(60,60,20,0.25); border: 1px dashed rgba(200,180,50,0.5);
  border-radius: 6px; padding: 5px; margin-bottom: 4px;
  min-height: 12px; display: flex; gap: 5px; flex-wrap: wrap; align-items: flex-start;
}
.territory-zone { display: flex; gap: 4px; padding: 4px 6px; margin-bottom: 4px; flex-wrap: wrap; align-items: center; }
.hand-zone { background: rgba(80,80,180,0.1); border: 1px solid rgba(80,80,180,0.3); }

.card {
  width: 40px; height: 56px; border-radius: 4px; overflow: hidden;
  border: 2px solid #4a8a4a; background: #1a2a3a;
  position: relative; flex-shrink: 0;
  transition: transform 0.3s, opacity 0.3s, box-shadow 0.3s;
}
.card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card.muted { opacity: 0.45; transform: rotate(90deg); }
.card.highlighted { box-shadow: 0 0 12px 3px #ffdd00; border-color: #ffdd00; }
.card.entering { animation: slideIn 0.35s ease; }

.def-badge {
  position: absolute; top: 2px; left: 0; right: 0;
  background: rgba(0,80,180,0.9); color: #aaddff; font-size: 7px; font-weight: bold;
  padding: 1px 2px; text-align: center; z-index: 10;
}
.copy-badge {
  position: absolute; bottom: 2px; left: 0; right: 0;
  background: rgba(0,100,100,0.9); color: #aaffff; font-size: 6px; font-weight: bold;
  padding: 1px 2px; text-align: center; z-index: 10;
}

.hand-card {
  width: 40px; height: 56px; border-radius: 4px; overflow: hidden;
  border: 2px solid #4a6a9a; background: #1a2a3a; flex-shrink: 0;
}
.hand-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

.territory-card {
  width: 34px; height: 22px; border-radius: 4px;
  background: #4a2a2a; border: 1px solid #8a4a4a;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: #ffaaaa; font-weight: bold;
  transition: transform 0.4s, opacity 0.3s;
}
.territory-card.used { transform: rotate(90deg); opacity: 0.4; }

.damage-float {
  position: fixed; font-size: 22px; font-weight: bold;
  pointer-events: none; animation: floatUp 1s ease forwards; z-index: 200;
  white-space: nowrap;
}
.damage-float.enemy-dmg { color: #ff4444; text-shadow: 0 0 12px #ff0000; }

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1.3); }
  100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-14px); }
  to { opacity: 1; transform: translateY(0); }
}

#description {
  background: rgba(0,0,0,0.65); border: 1px solid #4a8a4a;
  border-radius: 10px; padding: 12px 14px; margin-top: 8px;
  font-size: 13px; line-height: 1.75; min-height: 64px;
}
#step-title { color: #ffdd88; font-weight: bold; font-size: 15px; margin-bottom: 4px; }
#step-text { color: #d0e8d0; }

#loop-badge {
  display: none; font-size: 13px; font-weight: bold; padding: 5px 14px;
  border-radius: 20px; margin-top: 8px; text-align: center;
}

#controls { display: flex; gap: 8px; margin-top: 8px; justify-content: center; align-items: center; }
.ctrl-btn { padding: 9px 0; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; flex: 1; max-width: 120px; }
.ctrl-btn.prev { background: #3a3a5a; color: #aaccff; }
.ctrl-btn.close-btn { background: #3a3a3a; color: #cccccc; }
.ctrl-btn.next { background: #3a6a3a; color: #a8e0a8; }
#sub-controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 6px; }
.ctrl-btn.play-btn { background: #1a4a5a; color: #88ddff; font-size: 12px; padding: 4px 12px; flex: none; }
.ctrl-btn.play-btn.playing { background: #4a2a1a; color: #ffaa66; }
.ctrl-btn.reset { background: #4a1a1a; color: #ffaaaa; font-size: 11px; padding: 4px 12px; flex: none; }
#step-counter { color: #888; font-size: 13px; }
</style>
</head>
<body>
<div id="stage">

  <div id="life-area">
    <div class="life-bar-wrap">
      <span>相手 ❤️ <span id="enemy-life-num">20</span></span>
      <div class="life-bar"><div class="life-fill enemy" id="enemy-life-bar" style="width:100%"></div></div>
    </div>
    <div id="title-center">🛡 アルマジロルート解説</div>
    <div class="life-bar-wrap">
      <span>自分 ❤️ <span id="player-life-num">20</span></span>
      <div class="life-bar"><div class="life-fill player" id="player-life-bar" style="width:100%"></div></div>
    </div>
  </div>

  <div id="field">
    <div id="dmg-counter">🔥 累計ダメージ：<span id="dmg-count">0</span>点</div>

    <div class="zone-label">自分の戦場</div>
    <div class="zone player-zone" id="player-field"></div>

    <div class="zone-label">パイル</div>
    <div class="pile-zone" id="pile-area"></div>

    <div class="zone-label">領土（山岳1以上）</div>
    <div class="territory-zone" id="territory-area"></div>

    <div class="zone-label">手札</div>
    <div class="zone hand-zone" id="hand-area"></div>
  </div>

  <div id="controls">
    <button class="ctrl-btn prev" onclick="prevStep()">◀ 前へ</button>
    <button class="ctrl-btn close-btn" onclick="history.back()">✕ 閉じる</button>
    <button class="ctrl-btn next" onclick="nextStep()">次へ ▶</button>
  </div>
  <div id="sub-controls">
    <span id="step-counter"></span>
    <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶ 再生</button>
    <button class="ctrl-btn reset" onclick="resetAll()">↺ リセット</button>
  </div>

  <div id="loop-badge"></div>

  <div id="description">
    <div id="step-title"></div>
    <div id="step-text"></div>
  </div>
</div>

<script>
const IMAGES = {
  岩場の守備隊:   "https://acgtcg.com/img/BP2-016",
  岩場の斥候兵:   "https://acgtcg.com/img/BP2-017",
  崖下りの天才:   "https://acgtcg.com/img/BP2-018",
  国境警備隊長:   "https://acgtcg.com/img/BP2-019",
  アルマジロ王:   "https://acgtcg.com/img/BP2-020",
  ミミックオクトパス: "https://acgtcg.com/img/BP4-039",
};

function initState() {
  return {
    enemyLife: 20,
    playerField: ["崖下りの天才", "国境警備隊長"],
    hand: ["アルマジロ王"],
    pile: [],
    dmgCount: 0,
    mutedCards: [],
    defBuff: 0,
    scoutCopied: false,
    territories: ["山","山","山"],
    usedTerritories: 0,
    totalTerritories: 3,
  };
}

const steps = [
  // ===== 基本編：王ルート =====
  {
    title: "━━ ルート①：王ルート ━━",
    text: "盤面：崖下りの天才・国境警備隊長<br>手札：アルマジロ王<br>領土：山岳1以上（アルマジロ王のコスト3に合わせて3枚必要）",
    action: s => {
      s.territories = ["山","山","山"];
      s.totalTerritories = 3;
      return s;
    },
    isBasic: true,
  },
  {
    title: "① アルマジロ王をプレイ",
    text: "アルマジロ王をコスト3でプレイして戦場に出します。",
    action: s => {
      s.hand = [];
      s.playerField.push("アルマジロ王");
      s.usedTerritories = 3;
      return s;
    },
    highlight: ["アルマジロ王"],
    isBasic: true,
  },
  {
    title: "② 崖下りの天才起動：アルマジロ王＋国境警備隊長をムーブ！",
    text: "崖下りの天才の起動効果：アルマジロ2体をムーブする。<br>→ アルマジロ王と国境警備隊長がムーブ！<br>→ ムーブ時誘発：アルマジロ王2点＋国境警備隊長1点＝3点ダメージ！",
    action: s => {
      s.mutedCards = ["アルマジロ王", "国境警備隊長"];
      s.dmgCount += 3;
      s.enemyLife -= 3;
      return s;
    },
    damage: 3,
    highlight: ["崖下りの天才", "アルマジロ王", "国境警備隊長"],
    isBasic: true,
    isLoop: true,
  },
  {
    title: "③ 崖下りの天才の効果：アルマジロ王をウェイク！",
    text: "崖下りの天才の効果でATK0・DEF3以上の動物（アルマジロ王）をウェイク！<br>→ アルマジロ王が起き上がります。",
    action: s => {
      s.mutedCards = ["国境警備隊長"];
      return s;
    },
    highlight: ["アルマジロ王"],
    isBasic: true,
    isLoop: true,
  },
  {
    title: "④ 国境警備隊長の誘発：ウェイク！→ループ！",
    text: "「他のアルマジロがウェイクした時、このカードもウェイクする」<br>→ 国境警備隊長もウェイク！<br><br>崖下りの天才はムーブせずに起動できるので②から無限ループ！",
    action: s => {
      s.mutedCards = [];
      return s;
    },
    highlight: ["国境警備隊長"],
    isBasic: true,
    isLoop: true,
  },

  // ===== 応用編：守備隊・斥候兵ルート =====
  {
    title: "━━ ルート②：守備隊・斥候兵ルート ━━",
    text: "盤面：岩場の守備隊・岩場の斥候兵・崖下りの天才・国境警備隊長<br>領土：山岳1以上（コスト最大2のカードのみで、最速領土4枚から動けます）",
    action: s => {
      s.enemyLife = 20;
      s.playerField = ["岩場の守備隊", "岩場の斥候兵", "崖下りの天才", "国境警備隊長"];
      s.hand = [];
      s.mutedCards = [];
      s.dmgCount = 0;
      s.defBuff = 0;
      s.territories = ["山","山","山","山"];
      s.totalTerritories = 4;
      s.usedTerritories = 0;
      return s;
    },
    isAdvanced: true,
  },
  {
    title: "①岩場の守備隊起動：対象→岩場の斥候兵（DEF+1）",
    text: "岩場の守備隊の起動効果：<br>対象の岩場の斥候兵にDEF+1を与える。<br>→ 守備隊がムーブ！ムーブ時誘発で1点ダメージ！",
    action: s => {
      s.mutedCards = ["岩場の守備隊"];
      s.defBuff += 1;
      s.dmgCount += 1;
      s.enemyLife -= 1;
      return s;
    },
    damage: 1,
    highlight: ["岩場の守備隊", "岩場の斥候兵"],
    isAdvanced: true,
  },
  {
    title: "②崖下りの天才起動：斥候兵＋国境警備隊長をムーブ→斥候兵をウェイク",
    text: "崖下りの天才の起動効果：<br>岩場の斥候兵と国境警備隊長をムーブ→岩場の斥候兵（DEF3以上）をウェイク！<br>→ ムーブ時：斥候兵1点＋国境警備隊長1点＝2点ダメージ！",
    action: s => {
      s.mutedCards = ["国境警備隊長"];
      s.dmgCount += 2;
      s.enemyLife -= 2;
      return s;
    },
    damage: 2,
    highlight: ["崖下りの天才", "岩場の斥候兵", "国境警備隊長"],
    isAdvanced: true,
    isLoop: true,
  },
  {
    title: "③崖下りの天才の効果：岩場の斥候兵をウェイク！",
    text: "崖下りの天才の効果でATK0・DEF3以上の動物（岩場の斥候兵）をウェイク！",
    action: s => {
      s.mutedCards = ["国境警備隊長"];
      return s;
    },
    highlight: ["岩場の斥候兵"],
    isAdvanced: true,
    isLoop: true,
  },
  {
    title: "④国境警備隊長の誘発：ウェイク！→ループ！",
    text: "岩場の斥候兵がウェイクしたことで国境警備隊長の誘発効果が発動！<br>→ 国境警備隊長もウェイク！<br><br>①（守備隊）→②（天才）を繰り返すだけで<br>1ループ3点（守備隊1＋斥候兵1＋警備隊長1）が無限に！",
    action: s => {
      s.mutedCards = [];
      return s;
    },
    highlight: ["国境警備隊長"],
    isAdvanced: true,
    isLoop: true,
  },

  // ===== 発展編：ミミックオクトパス =====
  {
    title: "━━ 発展編：ミミックオクトパスで更にシンプルに ━━",
    text: "ミミックオクトパスが岩場の斥候兵をコピーして戦場にいる状態。<br>崖下りの天才も国境警備隊長も不要！<br>斥候兵とコピーの2体だけで無限ループが成立します。",
    action: s => {
      s.enemyLife = 20;
      s.playerField = ["岩場の斥候兵", "ミミックオクトパス（斥候兵コピー）"];
      s.hand = [];
      s.mutedCards = [];
      s.dmgCount = 0;
      s.scoutCopied = true;
      s.territories = ["山","山"];
      s.totalTerritories = 2;
      s.usedTerritories = 0;
      return s;
    },
    isExtra: true,
  },
  {
    title: "【発展①】岩場の斥候兵起動：ミミックをムーブ→斥候兵をウェイク",
    text: "岩場の斥候兵の起動：ATK0の動物1体をムーブまたはウェイク。<br>→ ミミックオクトパス（ATK0）をムーブ！<br>→ ミミックのムーブ時誘発：1点ダメージ！<br>→ 斥候兵の起動でATK0をウェイク→自分自身はムーブしたので…<br>→ ミミックをウェイクする！",
    action: s => {
      s.mutedCards = ["岩場の斥候兵"];
      s.dmgCount += 1;
      s.enemyLife -= 1;
      return s;
    },
    damage: 1,
    highlight: ["岩場の斥候兵", "ミミックオクトパス（斥候兵コピー）"],
    isExtra: true,
    isLoop: true,
  },
  {
    title: "【発展②】ミミック（コピー斥候兵）起動：斥候兵をムーブ→ミミックをウェイク",
    text: "ミミックオクトパス（斥候兵コピー）の起動：ATK0の動物1体をムーブまたはウェイク。<br>→ 岩場の斥候兵をムーブ！<br>→ 斥候兵のムーブ時誘発：1点ダメージ！<br>→ ミミックの起動でATK0をウェイク→斥候兵をウェイク！<br>→ ①に戻ってループ！",
    action: s => {
      s.mutedCards = ["ミミックオクトパス（斥候兵コピー）"];
      s.dmgCount += 1;
      s.enemyLife -= 1;
      return s;
    },
    damage: 1,
    highlight: ["ミミックオクトパス（斥候兵コピー）", "岩場の斥候兵"],
    isExtra: true,
    isLoop: true,
  },
  {
    title: "✅ まとめ：アルマジロルートの3形態",
    text: "【基本編：王ルート】<br>崖下りの天才でアルマジロ王＋警備隊長をムーブ→1ループ3点<br><br>【応用編：守備隊・斥候兵ルート】<br>守備隊で斥候兵にDEF+1→天才で斥候兵＋警備隊長をムーブ→1ループ3点<br>コスト最大2で最速領土4枚から動ける！<br><br>【発展編：ミミックオクトパス】<br>斥候兵とコピーがお互いを寝かせ起こし続ける無限1点ループ<br>崖下りの天才・国境警備隊長不要でシンプル！",
    action: s => s,
  },
];

let state = {};
let currentStep = 0;

function makeCard(name, opts = {}) {
  const div = document.createElement("div");
  div.className = "card" + (opts.entering ? " entering" : "");
  if (opts.highlighted) div.classList.add("highlighted");
  if (opts.muted) div.classList.add("muted");

  const imgKey = Object.keys(IMAGES).find(k => name.includes(k));
  if (imgKey) {
    const img = document.createElement("img");
    img.src = IMAGES[imgKey];
    img.onerror = () => {
      div.style.cssText += ";display:flex;align-items:center;justify-content:center;font-size:6px;color:#aaa;text-align:center;padding:2px;";
      div.textContent = name;
    };
    div.appendChild(img);
  } else {
    div.style.cssText += ";display:flex;align-items:center;justify-content:center;font-size:6px;color:#aaa;text-align:center;padding:2px;background:#2a3a4a;";
    div.textContent = name;
  }

  if (opts.defBuff > 0 && name.includes("斥候兵")) {
    const b = document.createElement("div");
    b.className = "def-badge";
    b.textContent = `DEF+${opts.defBuff}`;
    div.appendChild(b);
  }
  if (name.includes("ミミック") && opts.copied) {
    const b = document.createElement("div");
    b.className = "copy-badge";
    b.textContent = "斥候兵コピー";
    div.appendChild(b);
  }
  return div;
}

function makeHandCard(name) {
  const div = document.createElement("div");
  div.className = "hand-card";
  const imgKey = Object.keys(IMAGES).find(k => name.includes(k));
  if (imgKey) {
    const img = document.createElement("img");
    img.src = IMAGES[imgKey];
    img.onerror = () => {
      div.style.cssText += ";display:flex;align-items:center;justify-content:center;font-size:6px;color:#aaa;text-align:center;padding:2px;";
      div.textContent = name;
    };
    div.appendChild(img);
  }
  return div;
}

function showDamage(amount, delay = 0) {
  setTimeout(() => {
    const el = document.createElement("div");
    el.className = "damage-float enemy-dmg";
    el.textContent = `-${amount}点`;
    const rect = document.getElementById("enemy-life-bar").getBoundingClientRect();
    el.style.left = (rect.left + rect.width / 2 - 25) + "px";
    el.style.top = (window.scrollY + rect.top - 10) + "px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }, delay);
}

function render() {
  const s = state;
  const step = steps[currentStep];
  const highlights = step.highlight || [];

  const eLife = Math.max(0, s.enemyLife);
  document.getElementById("enemy-life-num").textContent = eLife;
  document.getElementById("enemy-life-bar").style.width = (eLife / 20 * 100) + "%";
  document.getElementById("dmg-count").textContent = s.dmgCount;

  // 戦場
  const pf = document.getElementById("player-field");
  pf.innerHTML = "";
  s.playerField.forEach(name => {
    const isMuted = (s.mutedCards || []).includes(name);
    const isHighlighted = highlights.some(h => name.includes(h) || h.includes(name.split("（")[0]));
    pf.appendChild(makeCard(name, {
      muted: isMuted,
      highlighted: isHighlighted,
      defBuff: s.defBuff,
      copied: s.scoutCopied,
    }));
  });

  // パイル
  const pa = document.getElementById("pile-area");
  pa.innerHTML = "";
  s.pile.forEach(name => {
    pa.appendChild(makeCard(name, { entering: true, highlighted: true }));
  });

  // 領土
  const ta = document.getElementById("territory-area");
  ta.innerHTML = "";
  s.territories.forEach((t, i) => {
    const card = document.createElement("div");
    card.className = "territory-card" + (i < s.usedTerritories ? " used" : "");
    card.textContent = t;
    ta.appendChild(card);
  });

  // 手札
  const ha = document.getElementById("hand-area");
  ha.innerHTML = "";
  s.hand.forEach(name => ha.appendChild(makeHandCard(name)));

  document.getElementById("step-title").textContent = step.title;
  document.getElementById("step-text").innerHTML = step.text;
  document.getElementById("step-counter").textContent = `${currentStep + 1} / ${steps.length}`;

  const badge = document.getElementById("loop-badge");
  if (step.isLoop && step.isBasic) {
    badge.style.cssText = "display:block;background:#4a2a0a;color:#ffddaa;font-size:13px;font-weight:bold;padding:5px 14px;border-radius:20px;margin-top:8px;text-align:center;border:1px solid #ffaa44;";
    badge.textContent = "🔁 ループ！1回3点！";
  } else if (step.isLoop && step.isAdvanced) {
    badge.style.cssText = "display:block;background:#2a4a0a;color:#ccffaa;font-size:13px;font-weight:bold;padding:5px 14px;border-radius:20px;margin-top:8px;text-align:center;border:1px solid #88cc44;";
    badge.textContent = "🔁 ループ！1回3点！";
  } else if (step.isLoop && step.isExtra) {
    badge.style.cssText = "display:block;background:#0a3a4a;color:#aaeeff;font-size:13px;font-weight:bold;padding:5px 14px;border-radius:20px;margin-top:8px;text-align:center;border:1px solid #44aacc;";
    badge.textContent = "🔁 無限1点ループ！";
  } else if (step.isBasic) {
    badge.style.cssText = "display:block;background:#4a2a0a;color:#ffddaa;font-size:13px;font-weight:bold;padding:5px 14px;border-radius:20px;margin-top:8px;text-align:center;border:1px solid #ffaa44;";
    badge.textContent = "🛡 王ルート";
  } else if (step.isAdvanced) {
    badge.style.cssText = "display:block;background:#2a4a0a;color:#ccffaa;font-size:13px;font-weight:bold;padding:5px 14px;border-radius:20px;margin-top:8px;text-align:center;border:1px solid #88cc44;";
    badge.textContent = "⚔️ 守備隊・斥候兵ルート";
  } else if (step.isExtra) {
    badge.style.cssText = "display:block;background:#0a3a4a;color:#aaeeff;font-size:13px;font-weight:bold;padding:5px 14px;border-radius:20px;margin-top:8px;text-align:center;border:1px solid #44aacc;";
    badge.textContent = "✨ 発展編：ミミックオクトパス";
  } else {
    badge.style.display = "none";
  }
}

function applyStep(idx) {
  const step = steps[idx];
  state = step.action({
    ...state,
    hand: [...state.hand],
    playerField: [...state.playerField],
    pile: [...(state.pile || [])],
    territories: [...state.territories],
    mutedCards: [...(state.mutedCards || [])],
  });
  if (step.damage) showDamage(step.damage, 300);
  render();
}

function nextStep() {
  stopPlay();
  if (currentStep < steps.length - 1) {
    currentStep++;
    applyStep(currentStep);
  }
}

function prevStep() {
  stopPlay();
  if (currentStep > 0) {
    currentStep--;
    replayTo(currentStep);
  }
}

function replayTo(target) {
  let s = initState();
  for (let i = 0; i <= target; i++) {
    s = steps[i].action({
      ...s,
      hand: [...s.hand],
      playerField: [...s.playerField],
      pile: [...(s.pile || [])],
      territories: [...s.territories],
      mutedCards: [...(s.mutedCards || [])],
    });
  }
  state = s;
  render();
}

function resetAll() {
  stopPlay();
  currentStep = 0;
  state = initState();
  render();
}

let playTimer = null;
const PLAY_INTERVAL = 2500;

function togglePlay() {
  if (playTimer) { stopPlay(); } else { startPlay(); }
}

function startPlay() {
  const btn = document.getElementById("playBtn");
  btn.textContent = "⏸ 停止";
  btn.classList.add("playing");
  playTimer = setInterval(() => {
    if (currentStep < steps.length - 1) {
      currentStep++;
      applyStep(currentStep);
    } else {
      stopPlay();
    }
  }, PLAY_INTERVAL);
}

function stopPlay() {
  if (playTimer) { clearInterval(playTimer); playTimer = null; }
  const btn = document.getElementById("playBtn");
  if (btn) { btn.textContent = "▶ 再生"; btn.classList.remove("playing"); }
}

state = initState();
render();
</script>
</body>
</html>
