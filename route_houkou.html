<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>咆哮ルート解説</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f1a24; color: #e0e8d0; font-family: 'Hiragino Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 12px; }
#stage { width: 100%; max-width: 680px; }

#life-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.life-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 13px; color: #ffdd88; font-weight: bold; }
.life-bar { width: 120px; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
.life-fill { height: 100%; border-radius: 6px; transition: width 0.6s; }
.life-fill.player { background: #4caf50; }
.life-fill.enemy { background: #c85a5a; }
#title-center { text-align: center; color: #a8e0a8; font-size: 14px; flex: 1; }

#field { background: rgba(0,0,0,0.5); border: 2px solid #3a6a4a; border-radius: 12px; padding: 7px; position: relative; }

#howl-counter {
  position: absolute; top: 6px; right: 8px;
  background: rgba(100,0,150,0.85); color: #ffaaff;
  font-size: 11px; font-weight: bold;
  padding: 2px 7px; border-radius: 10px;
  border: 1px solid #cc44ff; z-index: 20;
}

.zone-label { font-size: 10px; color: #6a8a6a; margin-bottom: 2px; }
.zone { display: flex; gap: 5px; flex-wrap: wrap; padding: 5px; border-radius: 8px; margin-bottom: 4px; align-items: flex-start; }
.player-zone { background: rgba(80,180,80,0.1); border: 1px solid rgba(80,180,80,0.3); }
.pile-zone {
  background: rgba(60,60,20,0.25); border: 1px dashed rgba(200,180,50,0.5);
  border-radius: 6px; padding: 5px; margin-bottom: 4px;
  min-height: 12px; display: flex; gap: 5px; flex-wrap: wrap; align-items: flex-start;
}
.territory-zone { display: flex; gap: 4px; padding: 4px 6px; margin-bottom: 4px; flex-wrap: wrap; align-items: center; }
.hand-zone { background: rgba(80,80,180,0.1); border: 1px solid rgba(80,80,180,0.3); }

/* デッキトップ表示 */
.deck-zone { display: flex; gap: 6px; padding: 4px 6px; margin-bottom: 4px; align-items: center; }
.deck-top-card {
  width: 40px; height: 56px; border-radius: 4px; overflow: hidden;
  border: 2px solid #88ccff; background: #1a2a3a; flex-shrink: 0;
  position: relative;
}
.deck-top-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.deck-top-label {
  position: absolute; bottom: 2px; left: 0; right: 0;
  background: rgba(0,80,180,0.85); color: #88ccff;
  font-size: 7px; text-align: center; font-weight: bold;
}
.deck-back {
  width: 40px; height: 56px; border-radius: 4px;
  background: linear-gradient(135deg, #1a3a5a, #0a1a2a);
  border: 2px solid #3a6a8a; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; color: #4a8aaa; font-weight: bold;
}

.card {
  width: 40px; height: 56px; border-radius: 4px; overflow: hidden;
  border: 2px solid #4a8a4a; background: #1a2a3a;
  position: relative; flex-shrink: 0;
  transition: transform 0.3s, opacity 0.3s, box-shadow 0.3s;
}
.card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card.highlighted { box-shadow: 0 0 12px 3px #ffdd00; border-color: #ffdd00; }
.card.entering { animation: slideIn 0.35s ease; }
.card.muted { opacity: 0.45; transform: rotate(90deg); }
.card.cancelled { box-shadow: 0 0 12px 3px #ff4444; border-color: #ff4444; opacity: 0.6; }

.hand-card {
  width: 40px; height: 56px; border-radius: 4px; overflow: hidden;
  border: 2px solid #4a6a9a; background: #1a2a3a; flex-shrink: 0;
}
.hand-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

.territory-card {
  width: 34px; height: 22px; border-radius: 4px;
  background: #2a4a2a; border: 1px solid #4a8a4a;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: #a8e0a8; font-weight: bold;
  transition: transform 0.4s, opacity 0.3s;
}
.territory-card.used { transform: rotate(90deg); opacity: 0.4; }
.territory-card.night { background: #1a1a3a; border-color: #4a4a8a; color: #aaaaff; }
.territory-card.plain { background: #3a3a1a; border-color: #8a8a4a; color: #ffffaa; }
.territory-card.forest { background: #1a3a1a; border-color: #4a8a4a; color: #aaffaa; }

.damage-float {
  position: fixed; font-size: 22px; font-weight: bold;
  pointer-events: none; animation: floatUp 1s ease forwards; z-index: 200;
  white-space: nowrap;
}
.damage-float.enemy-dmg { color: #ff4444; text-shadow: 0 0 12px #ff0000; }

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1.3); }
  100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-14px); }
  to { opacity: 1; transform: translateY(0); }
}

#description {
  background: rgba(0,0,0,0.65); border: 1px solid #4a8a4a;
  border-radius: 10px; padding: 12px 14px; margin-top: 8px;
  font-size: 13px; line-height: 1.75; min-height: 64px;
}
#step-title { color: #ffdd88; font-weight: bold; font-size: 15px; margin-bottom: 4px; }
#step-text { color: #d0e8d0; }

#loop-badge {
  display: none; font-size: 13px; font-weight: bold; padding: 5px 14px;
  border-radius: 20px; margin-top: 8px; text-align: center;
}

#controls { display: flex; gap: 8px; margin-top: 8px; justify-content: center; align-items: center; }
.ctrl-btn { padding: 9px 0; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; flex: 1; max-width: 120px; }
.ctrl-btn.prev { background: #3a3a5a; color: #aaccff; }
.ctrl-btn.close-btn { background: #3a3a3a; color: #cccccc; }
.ctrl-btn.next { background: #3a6a3a; color: #a8e0a8; }
#sub-controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 6px; }
.ctrl-btn.play-btn { background: #1a4a5a; color: #88ddff; font-size: 12px; padding: 4px 12px; flex: none; }
.ctrl-btn.play-btn.playing { background: #4a2a1a; color: #ffaa66; }
.ctrl-btn.reset { background: #4a1a1a; color: #ffaaaa; font-size: 11px; padding: 4px 12px; flex: none; }
#step-counter { color: #888; font-size: 13px; }
</style>
</head>
<body>
<div id="stage">

  <div id="life-area">
    <div class="life-bar-wrap">
      <span>相手 ❤️ <span id="enemy-life-num">20</span></span>
      <div class="life-bar"><div class="life-fill enemy" id="enemy-life-bar" style="width:100%"></div></div>
    </div>
    <div id="title-center">💜 咆哮ルート解説</div>
    <div class="life-bar-wrap">
      <span>自分 ❤️ <span id="player-life-num">20</span></span>
      <div class="life-bar"><div class="life-fill player" id="player-life-bar" style="width:100%"></div></div>
    </div>
  </div>

  <div id="field">
    <div id="howl-counter">💜 咆哮：<span id="howl-count">0</span>回 / 次は<span id="next-dmg">1</span>点</div>

    <div class="zone-label">自分の戦場</div>
    <div class="zone player-zone" id="player-field"></div>

    <div class="zone-label">パイル</div>
    <div class="pile-zone" id="pile-area"></div>

    <div style="display:flex; align-items:flex-start; gap:8px; margin-bottom:4px;">
      <div style="flex:1; min-width:0;">
        <div class="zone-label">領土（最低4枚）</div>
        <div class="territory-zone" id="territory-area"></div>
      </div>
      <div style="flex:1; min-width:0;">
        <div class="zone-label">デッキトップ</div>
        <div class="deck-zone" id="deck-area"></div>
      </div>
    </div>

    <div class="zone-label">手札</div>
    <div class="zone hand-zone" id="hand-area"></div>
  </div>

  <div id="controls">
    <button class="ctrl-btn prev" onclick="prevStep()">◀ 前へ</button>
    <button class="ctrl-btn close-btn" onclick="history.back()">✕ 閉じる</button>
    <button class="ctrl-btn next" onclick="nextStep()">次へ ▶</button>
  </div>
  <div id="sub-controls">
    <span id="step-counter"></span>
    <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶ 再生</button>
    <button class="ctrl-btn reset" onclick="resetAll()">↺ リセット</button>
  </div>

  <div id="loop-badge"></div>

  <div id="description">
    <div id="step-title"></div>
    <div id="step-text"></div>
  </div>
</div>

<script>
const IMAGES = {
  等価な検閲網:   "https://acgtcg.com/img/ACG-149",
  暗がりの保管庫: "https://acgtcg.com/img/ACG-148",
  臨終の咆哮:     "https://acgtcg.com/img/ACG-150",
  見狐:           "https://acgtcg.com/img/BP1-023",
};

function initState() {
  return {
    enemyLife: 20,
    playerField: ["等価な検閲網", "暗がりの保管庫"],
    hand: ["見狐", "臨終の咆哮"],
    pile: [],
    howlCount: 0,
    deckTopCard: null,   // デッキトップに置かれたカード
    territories: ["夜", "平", "平", "森"],
    usedTerritories: 0,
    kanagokuMuted: false,
    hokankoMuted: false,
  };
}

const steps = [
  {
    title: "初期状態",
    text: "盤面：等価な検閲網・暗がりの保管庫<br>手札：見狐（コスト1）・臨終の咆哮<br>領土：最低4枚（夜1・平地2・森1以上）",
    action: s => s,
  },
  {
    title: "① 暗がりの保管庫を起動",
    text: "暗がりの保管庫をムーブして起動効果を発動。<br>手札のカードをデッキトップに置き、デッキをシャッフルして引き直します。<br>→ 見狐（コスト1）をデッキトップに置きます。",
    action: s => {
      s.hand = s.hand.filter(h => h !== "見狐");
      s.deckTopCard = "見狐";
      s.hokankoMuted = true;
      return s;
    },
    highlight: ["暗がりの保管庫", "見狐"],
  },
  {
    title: "② 手札が臨終の咆哮だけになった",
    text: "手札が臨終の咆哮1枚だけになりました。<br>暗がりの保管庫の効果はまだ解決中（シャッフル・ドローが残っている）。<br>この間に臨終の咆哮をプレイします！",
    action: s => s,
    highlight: ["臨終の咆哮"],
  },
  {
    title: "③ 臨終の咆哮をプレイ→パイルへ",
    text: "唯一の手札・臨終の咆哮をプレイしてパイルへ。<br>手札が0枚になります。",
    action: s => {
      s.hand = [];
      s.pile = ["臨終の咆哮"];
      s.usedTerritories = 1;
      return s;
    },
    highlight: ["臨終の咆哮"],
  },
  {
    title: "④ 等価な検閲網が反応！",
    text: "等価な検閲網の効果：手札が0枚の時、カードがプレイされたらデッキトップを公開。<br>→ デッキトップは見狐（コスト1）！<br>パイルの臨終の咆哮もコスト1 → コスト一致！<br>→ 臨終の咆哮の発動をキャンセルして手札に戻す。領土がウェイク！",
    action: s => {
      s.pile = [];
      s.hand = ["臨終の咆哮"];
      s.howlCount += 1;
      s.usedTerritories = 0; // 領土ウェイクで戻る
      return s;
    },
    highlight: ["等価な検閲網"],
    isLoop: true,
  },
  {
    title: "⑤ また臨終の咆哮をプレイ→繰り返す",
    text: "手札に戻った臨終の咆哮を再びプレイ。<br>等価な検閲網がまた反応→キャンセル→手札へ…<br>これを19回繰り返します。",
    action: s => {
      s.howlCount = 19;
      return s;
    },
    isLoop: true,
  },
  {
    title: "⑥ 暗がりの保管庫のシャッフル・ドロー効果を解決",
    text: "19回繰り返した後、暗がりの保管庫の残りの効果を解決します。<br>デッキをシャッフルして、デッキトップに戻したカード分（1枚）ドロー。<br>→ 見狐が手札に戻ります。",
    action: s => {
      s.deckTopCard = null;
      s.hand = ["見狐", "臨終の咆哮"];
      s.hokankoMuted = false;
      return s;
    },
    highlight: ["暗がりの保管庫"],
  },
  {
    title: "⑦ 臨終の咆哮を20回目のプレイ→20点！",
    text: "今度は等価な検閲網の効果を使わずに臨終の咆哮を解決！<br>このターン「咆哮」を含むカードを19回プレイしているので…<br>→ 20点ダメージ！相手ライフ0！🏆",
    action: s => {
      s.hand = s.hand.filter(h => h !== "臨終の咆哮");
      s.pile = ["臨終の咆哮"];
      s.usedTerritories = 1;
      s.enemyLife = 0;
      s.howlCount = 20;
      return s;
    },
    damage: 20,
    highlight: ["臨終の咆哮"],
  },
  {
    title: "✅ まとめ：咆哮ルートのポイント",
    text: "【キーカード】<br>・等価な検閲網：手札0枚時にプレイをキャンセル→領土ウェイク<br>・暗がりの保管庫：コスト1カードをデッキトップに仕込む<br>・臨終の咆哮：プレイ回数×点数ダメージ<br><br>【手順】<br>①保管庫で見狐をデッキトップへ<br>②臨終の咆哮をプレイ→検閲網でキャンセル×19回<br>③保管庫のシャッフル・ドロー解決<br>④20回目の臨終の咆哮で20点フィニッシュ！",
    action: s => s,
  },
];

let state = {};
let currentStep = 0;

function makeCard(name, opts = {}) {
  const div = document.createElement("div");
  div.className = "card" + (opts.entering ? " entering" : "");
  if (opts.highlighted) div.classList.add("highlighted");
  if (opts.muted) div.classList.add("muted");
  if (opts.cancelled) div.classList.add("cancelled");

  const img = document.createElement("img");
  img.src = IMAGES[name] || "";
  img.onerror = () => {
    div.style.background = "#2a3a4a";
    div.style.display = "flex";
    div.style.alignItems = "center";
    div.style.justifyContent = "center";
    div.style.fontSize = "7px";
    div.style.color = "#aaa";
    div.style.textAlign = "center";
    div.style.padding = "2px";
    div.textContent = name;
  };
  div.appendChild(img);
  return div;
}

function makeHandCard(name) {
  const div = document.createElement("div");
  div.className = "hand-card";
  const img = document.createElement("img");
  img.src = IMAGES[name] || "";
  img.onerror = () => {
    div.style.background = "#2a3a4a";
    div.style.display = "flex";
    div.style.alignItems = "center";
    div.style.justifyContent = "center";
    div.style.fontSize = "7px";
    div.style.color = "#aaa";
    div.style.textAlign = "center";
    div.style.padding = "2px";
    div.textContent = name;
  };
  div.appendChild(img);
  return div;
}

function showDamage(amount, delay = 0) {
  setTimeout(() => {
    const el = document.createElement("div");
    el.className = "damage-float enemy-dmg";
    el.textContent = `-${amount}点`;
    const rect = document.getElementById("enemy-life-bar").getBoundingClientRect();
    el.style.left = (rect.left + rect.width / 2 - 25) + "px";
    el.style.top = (window.scrollY + rect.top - 10) + "px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }, delay);
}

function render() {
  const s = state;
  const step = steps[currentStep];
  const highlights = step.highlight || [];

  const eLife = Math.max(0, s.enemyLife);
  document.getElementById("enemy-life-num").textContent = eLife;
  document.getElementById("enemy-life-bar").style.width = (eLife / 20 * 100) + "%";
  document.getElementById("howl-count").textContent = s.howlCount;
  document.getElementById("next-dmg").textContent = s.howlCount + 1;

  // 戦場
  const pf = document.getElementById("player-field");
  pf.innerHTML = "";
  s.playerField.forEach(name => {
    const el = makeCard(name, {
      highlighted: highlights.includes(name),
      muted: (name === "暗がりの保管庫" && s.hokankoMuted) ||
             (name === "等価な検閲網" && s.kanagokuMuted),
    });
    pf.appendChild(el);
  });

  // パイル
  const pa = document.getElementById("pile-area");
  pa.innerHTML = "";
  s.pile.forEach(name => {
    pa.appendChild(makeCard(name, { entering: true, highlighted: true }));
  });

  // 領土
  const ta = document.getElementById("territory-area");
  ta.innerHTML = "";
  s.territories.forEach((t, i) => {
    const card = document.createElement("div");
    const isUsed = i < s.usedTerritories;
    const typeClass = t === "夜" ? " night" : t === "平" ? " plain" : " forest";
    card.className = "territory-card" + typeClass + (isUsed ? " used" : "");
    card.textContent = t === "夜" ? "夜" : t === "平" ? "平" : "森";
    ta.appendChild(card);
  });

  // デッキトップ
  const da = document.getElementById("deck-area");
  da.innerHTML = "";
  if (s.deckTopCard) {
    const topDiv = document.createElement("div");
    topDiv.className = "deck-top-card";
    const img = document.createElement("img");
    img.src = IMAGES[s.deckTopCard] || "";
    img.onerror = () => { topDiv.textContent = s.deckTopCard; };
    topDiv.appendChild(img);
    const label = document.createElement("div");
    label.className = "deck-top-label";
    label.textContent = "TOP";
    topDiv.appendChild(label);
    da.appendChild(topDiv);
  }
  const backDiv = document.createElement("div");
  backDiv.className = "deck-back";
  backDiv.textContent = "デッキ";
  da.appendChild(backDiv);

  // 手札
  const ha = document.getElementById("hand-area");
  ha.innerHTML = "";
  s.hand.forEach(name => ha.appendChild(makeHandCard(name)));

  document.getElementById("step-title").textContent = step.title;
  document.getElementById("step-text").innerHTML = step.text;
  document.getElementById("step-counter").textContent = `${currentStep + 1} / ${steps.length}`;

  const badge = document.getElementById("loop-badge");
  if (step.isLoop) {
    badge.style.cssText = "display:block;background:#3a1a5a;color:#ffaaff;font-size:13px;font-weight:bold;padding:5px 14px;border-radius:20px;margin-top:8px;text-align:center;border:1px solid #cc44ff;";
    badge.textContent = "🔁 ループ！咆哮回数が増えるたびダメージ+1点";
  } else {
    badge.style.display = "none";
  }
}

function applyStep(idx) {
  const step = steps[idx];
  state = step.action({
    ...state,
    hand: [...state.hand],
    playerField: [...state.playerField],
    pile: [...(state.pile || [])],
    territories: [...state.territories],
  });
  if (step.damage) showDamage(step.damage, 300);
  render();
}

function nextStep() {
  stopPlay();
  if (currentStep < steps.length - 1) {
    currentStep++;
    applyStep(currentStep);
  }
}

function prevStep() {
  stopPlay();
  if (currentStep > 0) {
    currentStep--;
    replayTo(currentStep);
  }
}

function replayTo(target) {
  let s = initState();
  for (let i = 0; i <= target; i++) {
    s = steps[i].action({
      ...s,
      hand: [...s.hand],
      playerField: [...s.playerField],
      pile: [...(s.pile || [])],
      territories: [...s.territories],
    });
  }
  state = s;
  render();
}

function resetAll() {
  stopPlay();
  currentStep = 0;
  state = initState();
  render();
}

let playTimer = null;
const PLAY_INTERVAL = 2500;

function togglePlay() {
  if (playTimer) { stopPlay(); } else { startPlay(); }
}

function startPlay() {
  const btn = document.getElementById("playBtn");
  btn.textContent = "⏸ 停止";
  btn.classList.add("playing");
  playTimer = setInterval(() => {
    if (currentStep < steps.length - 1) {
      currentStep++;
      applyStep(currentStep);
    } else {
      stopPlay();
    }
  }, PLAY_INTERVAL);
}

function stopPlay() {
  if (playTimer) { clearInterval(playTimer); playTimer = null; }
  const btn = document.getElementById("playBtn");
  if (btn) { btn.textContent = "▶ 再生"; btn.classList.remove("playing"); }
}

state = initState();
render();
</script>
</body>
</html>
