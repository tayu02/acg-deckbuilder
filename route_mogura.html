<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>モグラルート解説</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f1a24; color: #e0e8d0; font-family: 'Hiragino Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 12px; }
#stage { width: 100%; max-width: 680px; }

#life-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.life-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 13px; color: #ffdd88; font-weight: bold; }
.life-bar { width: 120px; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
.life-fill { height: 100%; border-radius: 6px; transition: width 0.6s; }
.life-fill.player { background: #4caf50; }
.life-fill.enemy { background: #c85a5a; }
#title-center { text-align: center; color: #a8e0a8; font-size: 14px; flex: 1; }

#field { background: rgba(0,0,0,0.5); border: 2px solid #3a6a4a; border-radius: 12px; padding: 7px; position: relative; }

#deck-counter {
  position: absolute; top: 6px; right: 8px;
  background: rgba(150,0,0,0.85); color: #ffaaaa;
  font-size: 11px; font-weight: bold;
  padding: 2px 7px; border-radius: 10px;
  border: 1px solid #ff4444; z-index: 20;
}

.zone-label { font-size: 10px; color: #6a8a6a; margin-bottom: 2px; }
.zone { display: flex; gap: 5px; flex-wrap: wrap; padding: 5px; border-radius: 8px; margin-bottom: 4px; align-items: flex-start; min-height: 70px; }
.player-zone { background: rgba(80,180,80,0.1); border: 1px solid rgba(80,180,80,0.3); }
.pile-zone {
  background: rgba(60,60,20,0.25); border: 1px dashed rgba(200,180,50,0.5);
  border-radius: 6px; padding: 5px; margin-bottom: 4px;
  min-height: 12px; display: flex; gap: 5px; flex-wrap: wrap; align-items: flex-start;
}
.hand-zone { background: rgba(80,80,180,0.1); border: 1px solid rgba(80,80,180,0.3); }
.grave-zone {
  background: rgba(60,40,20,0.3); border: 1px solid rgba(120,80,40,0.5);
  border-radius: 6px; padding: 5px; margin-bottom: 4px;
  min-height: 64px; position: relative;
}
.exile-zone {
  background: rgba(80,20,80,0.2); border: 1px solid rgba(150,50,150,0.4);
  border-radius: 6px; padding: 5px; margin-bottom: 4px;
  min-height: 12px; display: flex; gap: 5px; flex-wrap: wrap; align-items: flex-start;
}
.deck-zone {
  background: rgba(20,60,20,0.3); border: 1px solid rgba(50,120,50,0.5);
  border-radius: 6px; padding: 5px; margin-bottom: 4px;
  min-height: 12px; display: flex; gap: 5px; flex-wrap: wrap; align-items: flex-start;
}

.card {
  width: 40px; height: 56px; border-radius: 4px; overflow: hidden;
  border: 2px solid #4a8a4a; background: #1a2a3a;
  position: relative; flex-shrink: 0;
  transition: transform 0.3s, opacity 0.3s, box-shadow 0.3s;
}
.card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card.muted { opacity: 0.45; transform: rotate(90deg); }
.card.highlighted { box-shadow: 0 0 12px 3px #ffdd00; border-color: #ffdd00; }
.card.grave { opacity: 0.55; filter: grayscale(0.5); border-color: #6a4a2a; }
.card.exiled { opacity: 0.4; filter: grayscale(0.7); border-color: #6a2a6a; }
.card.ontop { border-color: #44ff88; box-shadow: 0 0 8px 2px rgba(50,200,100,0.4); }

.abc-badge {
  position: absolute; top: 2px; right: 2px;
  background: rgba(0,80,150,0.9); color: #aaddff;
  font-size: 8px; font-weight: bold;
  padding: 1px 3px; border-radius: 3px; z-index: 10;
}
.deck-badge {
  position: absolute; bottom: 2px; left: 0; right: 0;
  background: rgba(0,100,0,0.9); color: #aaffaa;
  font-size: 6px; font-weight: bold;
  padding: 1px 2px; text-align: center; z-index: 10;
}

.territory-card {
  width: 34px; height: 22px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: bold;
  transition: transform 0.4s, opacity 0.3s;
}
.territory-card.used { transform: rotate(90deg); opacity: 0.4; }
.territory-card.forest { background: #1a3a1a; border: 1px solid #4a8a4a; color: #aaffaa; }
.territory-card.mountain { background: #4a2a2a; border: 1px solid #8a4a4a; color: #ffaaaa; }

.hand-card {
  width: 40px; height: 56px; border-radius: 4px; overflow: hidden;
  border: 2px solid #4a6a9a; background: #1a2a3a; flex-shrink: 0;
  position: relative;
}
.hand-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

.damage-float {
  position: fixed; font-size: 20px; font-weight: bold;
  pointer-events: none; animation: floatUp 1s ease forwards; z-index: 200;
}
.damage-float.enemy-deck { color: #ff8844; text-shadow: 0 0 10px #ff4400; }

@keyframes floatUp {
  0% { opacity:1; transform:translateY(0) scale(1.2); }
  100% { opacity:0; transform:translateY(-50px) scale(0.8); }
}
@keyframes slideIn {
  from { opacity:0; transform:translateY(-14px); }
  to { opacity:1; transform:translateY(0); }
}

#description {
  background: rgba(0,0,0,0.65); border: 1px solid #4a8a4a;
  border-radius: 10px; padding: 12px 14px; margin-top: 8px;
  font-size: 13px; line-height: 1.75; min-height: 64px;
}
#step-title { color: #ffdd88; font-weight: bold; font-size: 15px; margin-bottom: 4px; }
#step-text { color: #d0e8d0; }

#loop-badge {
  display: none; font-size: 13px; font-weight: bold; padding: 5px 14px;
  border-radius: 20px; margin-top: 8px; text-align: center;
}

#controls { display: flex; gap: 8px; margin-top: 8px; justify-content: center; }
.ctrl-btn { padding: 9px 0; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; flex: 1; max-width: 120px; }
.ctrl-btn.prev { background: #3a3a5a; color: #aaccff; }
.ctrl-btn.close-btn { background: #3a3a3a; color: #cccccc; }
.ctrl-btn.next { background: #3a6a3a; color: #a8e0a8; }
#sub-controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 6px; }
.ctrl-btn.play-btn { background: #1a4a5a; color: #88ddff; font-size: 12px; padding: 4px 12px; flex: none; }
.ctrl-btn.play-btn.playing { background: #4a2a1a; color: #ffaa66; }
.ctrl-btn.reset { background: #4a1a1a; color: #ffaaaa; font-size: 11px; padding: 4px 12px; flex: none; }
#step-counter { color: #888; font-size: 13px; }
</style>
</head>
<body>
<div id="stage">
  <div id="life-area">
    <div class="life-bar-wrap">
      <span>相手デッキ 🃏 <span id="enemy-deck-num">40</span>枚</span>
      <div class="life-bar"><div class="life-fill enemy" id="enemy-deck-bar" style="width:100%"></div></div>
    </div>
    <div id="title-center">🦔 モグラルート解説</div>
    <div class="life-bar-wrap">
      <span>自分 ❤️ <span id="player-life-num">20</span></span>
      <div class="life-bar"><div class="life-fill player" id="player-life-bar" style="width:100%"></div></div>
    </div>
  </div>

  <div id="field">
    <div id="deck-counter">💀 相手デッキ：<span id="deck-count">40</span>枚</div>

    <div class="zone-label">自分の戦場</div>
    <div class="zone player-zone" id="player-field"></div>

    <div class="zone-label">パイル（効果スタック）</div>
    <div class="pile-zone" id="pile-area"></div>

    <div style="display:flex; gap:6px; margin-bottom:4px;">
      <div style="flex:1;">
        <div class="zone-label">デッキトップ（上→）</div>
        <div class="deck-zone" id="deck-top"></div>
      </div>
      <div style="flex:1;">
        <div class="zone-label">墓地</div>
        <div class="grave-zone" id="grave-area"></div>
      </div>
      <div style="flex:1;">
        <div class="zone-label">除外</div>
        <div class="exile-zone" id="exile-area"></div>
      </div>
    </div>

    <div class="zone-label">領土（森×2・山×2）</div>
    <div class="zone" id="territory-area" style="padding:4px 6px;margin-bottom:4px;flex-wrap:wrap;gap:4px;min-height:0;"></div>

    <div class="zone-label">手札</div>
    <div class="zone hand-zone" id="hand-area"></div>
  </div>

  <div id="controls">
    <button class="ctrl-btn prev" onclick="prevStep()">◀ 前へ</button>
    <button class="ctrl-btn close-btn" onclick="history.back()">✕ 閉じる</button>
    <button class="ctrl-btn next" onclick="nextStep()">次へ ▶</button>
  </div>
  <div id="sub-controls">
    <span id="step-counter"></span>
    <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶ 再生</button>
    <button class="ctrl-btn reset" onclick="resetAll()">↺ リセット</button>
  </div>

  <div id="loop-badge"></div>

  <div id="description">
    <div id="step-title"></div>
    <div id="step-text"></div>
  </div>
</div>

<script>
const IMAGES = {
  狂乱モグラ: "https://acgtcg.com/img/BP1-035",
  子モグラ:   "https://acgtcg.com/img/BP1-033",
  昇格勲章:   "https://acgtcg.com/img/パン田-ACG-101",
  簡易祭壇:   "https://acgtcg.com/img/BP1-039",
};

function initState() {
  return {
    playerLife: 20,
    enemyDeck: 40,
    field: ["子モグラA", "簡易祭壇"],
    hand: ["子モグラB", "昇格勲章"],
    grave: [],
    exile: [],
    deckTop: [],
    pile: [],
    mutedCards: [],
    territories: ["森","森","山","山"],
    usedTerr: 0,
  };
}

const steps = [
  {
    title: "初期状態",
    text: "戦場：子モグラA・簡易祭壇<br>手札：子モグラB・昇格勲章<br><br>昇格勲章で子モグラAを狂乱モグラにチェンジしてループを始めます！",
    action: s => s,
  },
  {
    title: "① 昇格勲章をプレイ：子モグラAを生贄→狂乱モグラをデッキからチェンジ！",
    text: "昇格勲章の効果：戦場の動物（子モグラA）を生贄に捧げ、同ATK/DEF・同種属の別名動物をデッキから戦場に出す。<br>→ 子モグラA（モグラ族1/1）を生贄に→狂乱モグラ（モグラ族1/1）をデッキから戦場へ！<br>狂乱モグラの登場時効果：自分のデッキ上3枚を墓地へ。<br>子モグラAと昇格勲章は墓地へ。",
    action: s => {
      s.hand = s.hand.filter(h => h !== "昇格勲章");
      s.field = s.field.filter(c => c !== "子モグラA");
      s.field.push("狂乱モグラ");
      s.grave = ["子モグラA", "昇格勲章", "自デッキ×3枚"];
      s.usedTerr = 2;  // 昇格勲章コスト1（山山）
      return s;
    },
    highlight: ["昇格勲章", "子モグラA", "狂乱モグラ"],
  },
  {
    title: "② 手札の子モグラBをプレイ→相手デッキ1枚破棄",
    text: "手札の子モグラBをプレイ。着地効果で相手のデッキ上1枚を墓地へ！<br>狂乱モグラの効果：カードがプレイされたのでパイルに効果を積みます。",
    action: s => {
      s.hand = s.hand.filter(h => h !== "子モグラB");
      s.field.push("子モグラB");
      s.enemyDeck -= 1;
      s.pile = ["狂乱モグラ：自デッキ上1枚を墓地へ（解決待ち）"];
      s.usedTerr = 0;  // 子モグラBはコスト0・条件のみ（条件は事前充足）
      return s;
    },
    deckDamage: 1,
    highlight: ["子モグラB", "狂乱モグラ"],
    isLoop: true,
  },
  {
    title: "③ 狂乱の効果解決前に簡易祭壇起動：子モグラBを生贄→デッキトップに仕込む",
    text: "パイルに狂乱の効果が積まれている間に簡易祭壇を起動！<br>子モグラBを生贄に→墓地から昇格勲章（上）・子モグラA（下）の順でデッキトップへ。<br>子モグラBは墓地へ。",
    action: s => {
      s.field = s.field.filter(c => c !== "子モグラB");
      s.grave = s.grave.filter(c => c !== "昇格勲章" && c !== "子モグラA");
      s.grave.push("子モグラB");
      s.deckTop = ["昇格勲章DT", "子モグラA_DT"];
      s.mutedCards = ["簡易祭壇"];
      return s;
    },
    highlight: ["簡易祭壇", "子モグラB"],
    isLoop: true,
  },
  {
    title: "④ 狂乱の効果解決：自デッキ上1枚（昇格勲章）を墓地へ！",
    text: "狂乱モグラのパイル効果が解決。<br>自分のデッキトップ（昇格勲章）を墓地へ！<br>→ 昇格勲章がデッキから墓地に落ちました。",
    action: s => {
      s.pile = [];
      s.deckTop = ["子モグラA_DT"];
      s.grave.push("昇格勲章");
      return s;
    },
    highlight: ["狂乱モグラ", "昇格勲章"],
    isLoop: true,
  },
  {
    title: "⑤ 昇格勲章の墓地誘発：次のデッキトップ（子モグラA）を除外→プレイ可能！",
    text: "昇格勲章がデッキから墓地に落ちた時の誘発：<br>デッキトップ（子モグラA）を除外して、このターン除外領域からプレイできる！",
    action: s => {
      s.deckTop = [];
      s.grave = s.grave.filter(c => c !== "昇格勲章");
      s.exile.push("子モグラA");
      return s;
    },
    highlight: ["昇格勲章", "子モグラA"],
    isLoop: true,
  },
  {
    title: "⑥ 子モグラAを除外からプレイ！→相手デッキ1枚破棄・狂乱が再び誘発",
    text: "除外の子モグラAをプレイ！着地効果で相手デッキ上1枚を墓地へ！<br>狂乱モグラの効果が再びパイルへ。<br>今度は簡易祭壇で子モグラAを生贄に昇格勲章・子モグラBをデッキトップへ仕込んで…<br>→ ループ継続！",
    action: s => {
      s.exile = s.exile.filter(c => c !== "子モグラA");
      s.field.push("子モグラA");
      s.enemyDeck -= 1;
      s.pile = ["狂乱モグラ：自デッキ上1枚を墓地へ（解決待ち）"];
      s.mutedCards = [];
      return s;
    },
    deckDamage: 1,
    highlight: ["子モグラA", "狂乱モグラ"],
    isLoop: true,
  },
  {
    title: "✅ まとめ：モグラルートのポイント",
    text: "【準備】昇格勲章で子モグラA→狂乱モグラにチェンジ<br><br>【ループ】<br>①子モグラをプレイ→相手デッキ1枚破棄・狂乱パイルへ<br>②簡易祭壇で子モグラを生贄→昇格勲章・次の子モグラをデッキトップへ<br>③狂乱の効果解決→昇格勲章がデッキから墓地へ<br>④昇格勲章の誘発→次の子モグラを除外→プレイ可能<br>⑤①に戻る<br><br>【核心】狂乱モグラが自分のデッキから昇格勲章を落とし、昇格勲章が次の子モグラを除外して連鎖させる！<br>子モグラA・Bが交互にプレイされ毎回相手デッキを1枚ずつ削り続けます。<br><br>最終的にライブラリーアウト勝利！",
    action: s => s,
  },
];

let state={}, currentStep=0;

function getImg(name) {
  if (name.includes("狂乱モグラ")) return IMAGES["狂乱モグラ"];
  if (name.includes("子モグラ")) return IMAGES["子モグラ"];
  if (name.includes("昇格勲章")) return IMAGES["昇格勲章"];
  if (name.includes("簡易祭壇")) return IMAGES["簡易祭壇"];
  return null;
}

function makeCard(name, opts={}) {
  const isMuted = (opts.mutedCards||[]).includes(name);
  const div = document.createElement("div");
  div.className = "card"
    + (isMuted ? " muted" : "")
    + (opts.grave ? " grave" : "")
    + (opts.exiled ? " exiled" : "")
    + (opts.ontop ? " ontop" : "")
    + (opts.highlighted ? " highlighted" : "");

  const url = getImg(name);
  if (url) {
    const img = document.createElement("img");
    img.src = url;
    img.onerror = () => {
      div.style.cssText += ";display:flex;align-items:center;justify-content:center;font-size:6px;color:#aaa;text-align:center;padding:2px;";
      div.textContent = name.replace("_DT","");
    };
    div.appendChild(img);
  } else {
    div.style.cssText += ";display:flex;align-items:center;justify-content:center;font-size:6px;color:#aaa;text-align:center;padding:2px;background:#2a3a4a;";
    div.textContent = name.replace("_DT","");
  }

  // A/Bラベル
  const abc = name.includes("子モグラA") ? "A" : name.includes("子モグラB") ? "B" : null;
  if (abc) {
    const b = document.createElement("div");
    b.className = "abc-badge";
    b.textContent = abc;
    div.appendChild(b);
  }

  // デッキトップラベル
  if (name.includes("_DT")) {
    const b = document.createElement("div");
    b.className = "deck-badge";
    b.textContent = "TOP";
    div.appendChild(b);
  }

  return div;
}

function showDeckDamage(amount) {
  setTimeout(() => {
    const el = document.createElement("div");
    el.className = "damage-float enemy-deck";
    el.textContent = `-${amount}枚`;
    const rect = document.getElementById("enemy-deck-bar").getBoundingClientRect();
    el.style.left = (rect.left + rect.width/2 - 25) + "px";
    el.style.top = (window.scrollY + rect.top - 10) + "px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }, 400);
}

function render() {
  const s = state;
  const step = steps[currentStep];
  const hl = step.highlight || [];

  document.getElementById("player-life-num").textContent = s.playerLife;
  document.getElementById("player-life-bar").style.width = (s.playerLife/20*100)+"%";
  document.getElementById("enemy-deck-num").textContent = Math.max(0, s.enemyDeck);
  document.getElementById("deck-count").textContent = Math.max(0, s.enemyDeck);
  document.getElementById("enemy-deck-bar").style.width = (Math.max(0,s.enemyDeck)/40*100)+"%";

  // 戦場
  const pf = document.getElementById("player-field");
  pf.innerHTML = "";
  s.field.forEach(name => {
    const isHl = hl.some(h => name.includes(h));
    pf.appendChild(makeCard(name, {mutedCards:s.mutedCards, highlighted:isHl}));
  });

  // パイル
  const pa = document.getElementById("pile-area");
  pa.innerHTML = "";
  (s.pile||[]).forEach(e => {
    const el = document.createElement("div");
    el.style.cssText = "background:rgba(80,70,0,0.7);border:1px solid #aa9900;border-radius:6px;padding:3px 6px;font-size:10px;color:#ffee88;";
    el.textContent = "▶ "+e;
    pa.appendChild(el);
  });

  // デッキトップ
  const dt = document.getElementById("deck-top");
  dt.innerHTML = "";
  (s.deckTop||[]).forEach(name => {
    const isHl = hl.some(h => name.includes(h));
    dt.appendChild(makeCard(name, {ontop:true, highlighted:isHl}));
  });

  // 墓地
  const ga = document.getElementById("grave-area");
  ga.innerHTML = "";
  (s.grave||[]).forEach((name,i) => {
    const el = makeCard(name, {grave:true});
    el.style.position = "absolute";
    el.style.left = (4+i*10)+"px";
    el.style.top = "4px";
    el.style.zIndex = i+1;
    ga.appendChild(el);
  });

  // 除外
  const ea = document.getElementById("exile-area");
  ea.innerHTML = "";
  (s.exile||[]).forEach(name => {
    const isHl = hl.some(h => name.includes(h));
    ea.appendChild(makeCard(name, {exiled:true, highlighted:isHl}));
  });

  // 領土
  const ta = document.getElementById("territory-area");
  if (ta) {
    ta.innerHTML = "";
    (s.territories||[]).forEach((t,i) => {
      const card = document.createElement("div");
      const tc = t==="森" ? " forest" : " mountain";
      card.className = "territory-card" + tc + (i < (s.usedTerr||0) ? " used" : "");
      card.textContent = t;
      ta.appendChild(card);
    });
  }

  // 手札
  const ha = document.getElementById("hand-area");
  ha.innerHTML = "";
  (s.hand||[]).forEach(name => {
    const div = document.createElement("div");
    div.className = "hand-card";
    const url = getImg(name);
    if (url) {
      const img = document.createElement("img");
      img.src = url;
      img.onerror = () => {
        div.style.cssText+=";display:flex;align-items:center;justify-content:center;font-size:6px;color:#aaa;text-align:center;padding:2px;";
        div.textContent=name;
      };
      div.appendChild(img);
    }
    const abc = name.includes("子モグラA")?"A":name.includes("子モグラB")?"B":null;
    if (abc) {
      const b = document.createElement("div");
      b.className = "abc-badge";
      b.textContent = abc;
      div.appendChild(b);
    }
    ha.appendChild(div);
  });

  document.getElementById("step-title").textContent = step.title;
  document.getElementById("step-text").innerHTML = step.text;
  document.getElementById("step-counter").textContent = `${currentStep+1} / ${steps.length}`;

  const badge = document.getElementById("loop-badge");
  if (step.isLoop) {
    badge.style.cssText = "display:block;background:#2a4a1a;color:#aaffaa;font-size:13px;font-weight:bold;padding:5px 14px;border-radius:20px;margin-top:8px;text-align:center;border:1px solid #44cc44;";
    badge.textContent = "🔁 ループ！毎回相手デッキを削る！";
  } else {
    badge.style.display = "none";
  }
}

function deepCopy(s) {
  return {...s,
    field:[...s.field], hand:[...s.hand],
    grave:[...s.grave], exile:[...s.exile],
    pile:[...(s.pile||[])], deckTop:[...(s.deckTop||[])],
    mutedCards:[...(s.mutedCards||[])],
    territories:[...(s.territories||[])],
  };
}

function applyStep(idx) {
  state = steps[idx].action(deepCopy(state));
  if (steps[idx].deckDamage) showDeckDamage(steps[idx].deckDamage);
  render();
}

function nextStep() { stopPlay(); if(currentStep<steps.length-1){currentStep++;applyStep(currentStep);} }
function prevStep() {
  stopPlay();
  if(currentStep>0){
    currentStep--;
    let s=initState();
    for(let i=0;i<=currentStep;i++) s=steps[i].action(deepCopy(s));
    state=s; render();
  }
}
function resetAll() { stopPlay(); currentStep=0; state=initState(); render(); }

let playTimer=null;
const PLAY_INTERVAL=2500;
function togglePlay(){ if(playTimer){stopPlay();}else{startPlay();} }
function startPlay(){
  const btn=document.getElementById("playBtn");
  btn.textContent="⏸ 停止"; btn.classList.add("playing");
  playTimer=setInterval(()=>{ if(currentStep<steps.length-1){currentStep++;applyStep(currentStep);}else{stopPlay();} },PLAY_INTERVAL);
}
function stopPlay(){
  if(playTimer){clearInterval(playTimer);playTimer=null;}
  const btn=document.getElementById("playBtn");
  if(btn){btn.textContent="▶ 再生";btn.classList.remove("playing");}
}

state=initState();
render();
</script>
